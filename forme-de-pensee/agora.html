<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agora collective — Forme de pensée</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');
  :root{--cream:#f2ede4;--ink:#2a2725;--mid:#7a756c;--light:#b8b3aa;--faint:#d5d0c8;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--cream);font-family:'DM Mono',monospace;color:var(--ink);
    min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;overflow:hidden;-webkit-font-smoothing:antialiased;}
  .canvas-wrap{width:100vw;height:100vh;position:relative;}
  #cv{width:100%;height:100%;display:block;object-fit:contain;}
  .overlay{position:fixed;z-index:10;pointer-events:none;}
  .top-left{top:24px;left:28px;}
  .top-right{top:24px;right:28px;text-align:right;}
  .bottom-center{bottom:20px;left:50%;transform:translateX(-50%);text-align:center;}
  .ov-title{font-family:'Instrument Serif',serif;font-size:clamp(1.2em,3vw,1.8em);font-weight:400;color:var(--ink);opacity:.7;}
  .ov-count{font-family:'DM Mono',monospace;font-size:clamp(.7em,1.8vw,1em);color:var(--mid);letter-spacing:.08em;}
  .ov-footer{font-family:'DM Mono',monospace;font-size:10px;color:var(--light);letter-spacing:.12em;text-transform:uppercase;}
  .ov-refresh{font-family:'DM Mono',monospace;font-size:9px;color:var(--light);letter-spacing:.08em;margin-top:4px;}
</style>
</head>
<body>
<div class="canvas-wrap"><canvas id="cv"></canvas></div>
<div class="overlay top-left">
  <div class="ov-title">Agora collective</div>
</div>
<div class="overlay bottom-center">
  <div class="ov-footer"></div>
</div>
<script>
// ===== CONSTANTS =====
const W=1920, H=2400, MG=72, CX=W/2, CR=[242,237,228], INK='0,0,0';
const bustScale=0.48; // 2/3 minus 30% (20+10)

const cv=document.getElementById('cv');cv.width=W;cv.height=H;
let ctx=cv.getContext('2d');

// Canvas offscreen pour les formes — jamais effacé, incrémental
const formsCv=document.createElement('canvas');formsCv.width=W;formsCv.height=H;
const formsCtx=formsCv.getContext('2d');

// ===== URL PARAMS =====
const urlParams=new URLSearchParams(window.location.search);
const REFRESH_MIN=parseFloat(urlParams.get('refresh')||'0.5'); // poll every 30s by default
const SHOW_BUST=urlParams.get('bust')!=='0'; // ?bust=0 to hide bust

// ===== API =====
const API_URL='https://script.google.com/macros/s/AKfycbw1LKhlopH5hTxful2B0DoxvI0pgst3bOHB2hr-gt67f7qQ5I9x-A3IeWtcOAwP_ROQ/exec?action=list';

// ===== SEEDED RANDOM =====
function mkR(s){return()=>{s=(s*16807+7)%2147483647;return(s&0x7fffffff)/0x7fffffff;};}

// ===== BUST =====
function renderBust(){
  const bW=760,bH=560,off=document.createElement('canvas');off.width=bW;off.height=bH;
  const c=off.getContext('2d'),bx=bW/2,by=0;
  const nB=by+bH*.08,mY=by+bH*.18,chY=by+bH*.34,nT=chY+10,nBo=by+bH*.48,sY=by+bH*.55,bot=bH;
  const fW=110,chW=86;
  // Head
  c.fillStyle='#a09a92';c.beginPath();c.moveTo(bx-fW,by);c.lineTo(bx+fW,by);
  c.quadraticCurveTo(bx+fW+4,chY-28,bx+chW+6,chY);c.quadraticCurveTo(bx+14,chY+12,bx-2,chY+8);
  c.quadraticCurveTo(bx-18,chY+10,bx-chW,chY+2);c.quadraticCurveTo(bx-fW-4,chY-24,bx-fW,by);c.fill();
  const fg=c.createLinearGradient(bx-fW,mY,bx+fW,mY);
  fg.addColorStop(0,'rgba(180,175,168,0.15)');fg.addColorStop(.4,'rgba(180,175,168,0)');fg.addColorStop(1,'rgba(140,135,128,0.1)');
  c.fillStyle=fg;c.fill();
  // Nose
  c.fillStyle='rgba(85,80,74,0.25)';c.beginPath();c.moveTo(bx-14,by);c.quadraticCurveTo(bx-16,nB-4,bx-10,nB+6);
  c.quadraticCurveTo(bx,nB+12,bx+10,nB+6);c.quadraticCurveTo(bx+16,nB-4,bx+14,by);c.closePath();c.fill();
  c.fillStyle='rgba(70,66,60,0.28)';c.beginPath();c.ellipse(bx-11,nB+3,6,4.4,.15,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(bx+10,nB+3,6,4.4,-.1,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(85,80,74,0.1)';c.fillRect(bx-6,nB+8,12,mY-nB-12);
  // Mouth
  c.fillStyle='rgba(120,115,108,0.35)';c.beginPath();c.moveTo(bx-30,mY+2);c.quadraticCurveTo(bx-12,mY-7,bx+2,mY-4);
  c.quadraticCurveTo(bx+16,mY-6,bx+28,mY+1);c.quadraticCurveTo(bx+2,mY+4,bx-30,mY+2);c.fill();
  c.fillStyle='rgba(130,125,118,0.25)';c.beginPath();c.moveTo(bx-22,mY+5);c.quadraticCurveTo(bx,mY+18,bx+24,mY+4);
  c.quadraticCurveTo(bx,mY+9,bx-22,mY+5);c.fill();
  c.strokeStyle='rgba(75,72,66,0.28)';c.lineWidth=1.4;c.beginPath();c.moveTo(bx-30,mY+2);
  c.quadraticCurveTo(bx-6,mY-3,bx+2,mY-1);c.quadraticCurveTo(bx+16,mY-2,bx+28,mY+1);c.stroke();
  c.fillStyle='rgba(85,80,74,0.08)';c.beginPath();c.ellipse(bx-2,chY-8,chW-16,24,0,0,Math.PI*2);c.fill();
  // Neck
  const nW=38;c.fillStyle='#908a82';c.beginPath();c.moveTo(bx-nW,nT);c.lineTo(bx+nW,nT-2);
  c.lineTo(bx+nW+2,nBo);c.lineTo(bx-nW-2,nBo+2);c.closePath();c.fill();
  c.fillStyle='rgba(70,66,60,0.15)';c.beginPath();c.ellipse(bx,nT+8,nW+8,14,0,0,Math.PI);c.fill();
  // Shoulders
  c.fillStyle='#706b64';c.beginPath();c.moveTo(bx-nW-2,nBo+2);
  c.lineTo(bx-nW-35,sY-2);c.lineTo(bx-136,sY);
  c.quadraticCurveTo(bx-200,sY+8,bx-260,sY+20);c.lineTo(bx-276,bot);
  c.lineTo(bx+284,bot);c.lineTo(bx+260,sY+20);
  c.quadraticCurveTo(bx+200,sY+8,bx+136,sY);
  c.quadraticCurveTo(bx+nW+55,sY-2,bx+nW+2,nBo);c.closePath();c.fill();
  // V-neck
  c.fillStyle='#807b74';c.beginPath();c.moveTo(bx-nW-2,nBo+4);
  c.quadraticCurveTo(bx-12,nBo+40,bx,sY+30);
  c.quadraticCurveTo(bx+12,nBo+38,bx+nW+2,nBo+2);
  c.lineTo(bx+nW+2,nBo);c.quadraticCurveTo(bx+10,nBo+28,bx,sY+18);
  c.quadraticCurveTo(bx-10,nBo+30,bx-nW-2,nBo+2);c.closePath();c.fill();
  c.strokeStyle='rgba(60,57,52,0.1)';c.lineWidth=1.5;
  c.beginPath();c.moveTo(bx-100,sY+36);c.quadraticCurveTo(bx-50,sY+48,bx-12,sY+60);c.stroke();
  c.beginPath();c.moveTo(bx+88,sY+44);c.quadraticCurveTo(bx+44,sY+52,bx+12,sY+58);c.stroke();
  return{data:c.getImageData(0,0,bW,bH),w:bW,h:bH};
}
const bust=renderBust();
const bustBottom=H*.52+bust.h+bust.h*0.1; // descendu de 10%
const bustTop=bustBottom-bust.h*bustScale;
const cutY=bustTop;

function drawBust(){
  const R=mkR(999),bx=CX-bust.w*bustScale/2,by=bustTop;
  for(let i=0;i<40000;i++){const lx=R()*bust.w,ly=R()*bust.h;
    const ix=Math.floor(lx),iy=Math.floor(ly);if(ix<0||ix>=bust.w||iy<0||iy>=bust.h)continue;
    const id=(iy*bust.w+ix)*4;if(bust.data.data[id+3]<10)continue;
    const dk=1-bust.data.data[id]/255;if(R()>dk*1.4+.03)continue;
    ctx.fillStyle=`rgba(60,57,52,${.22+dk*.35})`;
    ctx.beginPath();ctx.arc(bx+lx*bustScale,by+ly*bustScale,.6+R()*.35,0,Math.PI*2);ctx.fill();}
  const bVisH=bust.h*bustScale;
  const bf=ctx.createLinearGradient(0,bustTop+bVisH-40,0,bustTop+bVisH);
  bf.addColorStop(0,'rgba(242,237,228,0)');bf.addColorStop(1,`rgb(${CR})`);
  ctx.fillStyle=bf;ctx.fillRect(CX-400,bustTop+bVisH-40,800,40);
}

// ===== STITCH PRIMITIVES — hand-drawn style =====
function ST(x1,y1,x2,y2,al,R){
  const jt=2;
  x1+=(R()-.5)*jt;y1+=(R()-.5)*jt;x2+=(R()-.5)*jt;y2+=(R()-.5)*jt;
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);if(len<1.5)return;
  const nx=dx/len,ny=dy/len;
  const bow=(R()-.5)*4;
  const tremFreq=3+R()*5;
  const tremAmp=0.5+R()*1;
  let d=0;
  while(d<len){
    const sl=Math.min(5+R()*8,len-d);
    const t=d/len;
    const w=bow*Math.sin(t*Math.PI)+Math.sin(t*tremFreq*Math.PI)*tremAmp*(0.5+R())+(R()-.5)*1;
    const de=Math.min(d+sl,len);
    const t2=de/len;
    const w2=bow*Math.sin(t2*Math.PI)+Math.sin(t2*tremFreq*Math.PI)*tremAmp*(0.5+R())+(R()-.5)*1;
    ctx.beginPath();
    ctx.moveTo(x1+nx*d+ny*w,y1+ny*d-nx*w);
    ctx.lineTo(x1+nx*de+ny*w2,y1+ny*de-nx*w2);
    ctx.strokeStyle='rgba(0,0,0,0.9)';
    ctx.lineWidth=6+R()*4;
    ctx.lineCap='round';ctx.stroke();
    d+=sl+3+R()*1.5;
  }
}
function SA(cx,cy,r,a1,a2,al,R){
  const rBase=r*(0.95+R()*0.1);
  const wobbleAmp=r*0.03+1;
  const wobbleFreq=4+R()*6;
  const steps=Math.max(10,Math.floor(Math.abs(a2-a1)*rBase/6));
  for(let i=0;i<steps;i++){
    const t1=a1+(a2-a1)*((i+R()*0.3)/steps);
    const t2=a1+(a2-a1)*((i+0.4+R()*0.4)/steps);
    const r1=rBase+Math.sin(t1*wobbleFreq)*wobbleAmp+(R()-.5)*1.5;
    const r2=rBase+Math.sin(t2*wobbleFreq)*wobbleAmp+(R()-.5)*1.5;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(t1)*r1,cy+Math.sin(t1)*r1);
    ctx.lineTo(cx+Math.cos(t2)*r2,cy+Math.sin(t2)*r2);
    ctx.strokeStyle='rgba(0,0,0,0.75)';
    ctx.lineWidth=7+R()*4;ctx.lineCap='round';ctx.stroke();
  }
}
function PG(cx,cy,r,sides,rot,al,R){
  const vs=[];for(let i=0;i<sides;i++){
    const a=rot+(i/sides)*Math.PI*2+(R()-.5)*.08;
    const rv=r*(0.92+R()*0.16);
    vs.push({x:cx+Math.cos(a)*rv+(R()-.5)*2,y:cy+Math.sin(a)*rv+(R()-.5)*2});}
  for(let i=0;i<sides;i++)ST(vs[i].x,vs[i].y,vs[(i+1)%sides].x,vs[(i+1)%sides].y,al,R);return vs;
}
function HT(hx,hy,r,angle,sp,al,R){
  const cos=Math.cos(angle+(R()-.5)*.06),sin=Math.sin(angle+(R()-.5)*.06);
  for(let d=-r;d<=r;d+=sp*(0.7+R()*0.6)){
    const ch=Math.sqrt(Math.max(0,r*r-d*d));if(ch<3)continue;
    const drift=(R()-.5)*1.5;const angleJit=(R()-.5)*1;
    ST(hx+cos*d-sin*ch+drift,hy+sin*d+cos*ch+angleJit,
       hx+cos*d+sin*ch-drift,hy+sin*d-cos*ch-angleJit,al,R);}
}


// ===== PARAMS =====
function makeParams(str,mov,intensity,f1,f2,f3){
  const intMap={light:{cpx:3,den:.3,mul:3},anchored:{cpx:6,den:.5,mul:9},dense:{cpx:9,den:.7,mul:18},overflow:{cpx:12,den:1,mul:27}};
  const rhyMap={classify_linear:'accumulate',classify_spiral:'ferment',classify_parallel:'bounce',classify_leap:'flash',
    connect_linear:'accumulate',connect_spiral:'bounce',connect_parallel:'flash',connect_leap:'flash',
    layer_linear:'ferment',layer_spiral:'ferment',layer_parallel:'accumulate',layer_leap:'bounce',
    grow_linear:'ferment',grow_spiral:'bounce',grow_parallel:'accumulate',grow_leap:'flash'};
  const int=intMap[intensity]||intMap.anchored;
  let seed=73;
  const vals=[str,mov,intensity];
  vals.forEach((v,i)=>{for(let c=0;c<v.length;c++)seed=(seed*31+v.charCodeAt(c)+i*137)%2147483647;});
  return{str,mov,rhy:rhyMap[str+'_'+mov]||'accumulate',cpx:int.cpx,den:int.den,mul:int.mul,
    flip1:!!f1,flip2:!!f2,flip3:!!f3,seed};
}

// ===== 20 PRESETS — seed population before real participants arrive =====
const _S=['classify','connect','layer','grow'];
const _M=['linear','spiral','parallel','leap'];
const _I=['light','anchored','dense','overflow'];
const PRESETS=[];
{
  const R=mkR(12345);
  // 16 base morphologies + 4 extra
  for(let si=0;si<4;si++)for(let mi=0;mi<4;mi++){
    const p=makeParams(_S[si],_M[mi],_I[Math.floor(R()*4)],R()>.5,R()>.5,R()>.5);
    p.seed=(p.seed*31+si*17+mi*53)%2147483647;
    PRESETS.push(p);
  }
  const R2=mkR(99999);
  for(let i=0;i<4;i++){
    const p=makeParams(_S[Math.floor(R2()*4)],_M[Math.floor(R2()*4)],_I[Math.floor(R2()*4)],R2()>.5,R2()>.5,R2()>.5);
    p.seed=(p.seed*31+i*71+7777)%2147483647;
    PRESETS.push(p);
  }
}

// ===== TRACE MORPHOLOGIES FOR AGORA — primitive-draw approach =====
// Each form draws 3-5 primitives from a shared menu. The morphology (str×mov)
// biases which primitives are more likely, but any form can draw any primitive.
// The seed controls all random choices → deterministic, unique per participant.
function drawFormSimplified(p){
  ctx.save();
  const R=mkR(p.seed+500),cx=CX;
  const ancY=cutY+4;
  const zM=0.03,innerW=W-2*MG,innerH=H-2*MG;
  const zoneT=MG+innerH*zM,zoneL=MG+innerW*zM,zoneR=W-MG-innerW*zM;
  const zoneW=zoneR-zoneL,zoneH=ancY-zoneT,zoneHW=zoneW/2;
  ctx.beginPath();ctx.rect(zoneL,zoneT,zoneW,zoneH+20);ctx.clip();
  const rawBR=Math.min(700+p.mul*60+p.cpx*55,1400)*(p.flip1?1.15:.88);
  const bR=Math.min(rawBR,zoneHW,zoneH*.47);
  const fcy=Math.max(zoneT+bR,Math.min(ancY-bR,zoneT+zoneH*(p.flip2?.45:.55)));
  const A=0.9;

  // === PRIMITIVE MENU ===
  // 0: straight line (varied angle, length)
  // 1: arc (partial circle, varied radius, span, position)
  // 2: polygon (3-7 sides, varied size, rotation)
  // 3: sine fragment (short wavy curve)
  // 4: branch (trunk + 1-2 forks)
  // 5: hatch cluster (2-4 parallel short lines)
  // 6: cross / star mark
  // 7: spiral fragment (partial spiral arm)

  // Morphology-based probability weights (sum ~1 each, but unnormalized is fine)
  const weights = {
    classify_linear:   [.25,.05,.05,.10,.15,.25,.10,.05],
    classify_spiral:   [.10,.15,.25,.05,.05,.10,.10,.20],
    classify_parallel: [.30,.05,.05,.25,.05,.20,.05,.05],
    classify_leap:     [.15,.10,.25,.05,.10,.05,.20,.10],
    connect_linear:    [.10,.15,.05,.30,.10,.05,.05,.20],
    connect_spiral:    [.05,.20,.10,.10,.05,.05,.10,.35],
    connect_parallel:  [.25,.10,.10,.05,.15,.05,.25,.05],
    connect_leap:      [.10,.30,.15,.10,.05,.10,.05,.15],
    layer_linear:      [.15,.05,.05,.10,.10,.25,.05,.25],
    layer_spiral:      [.05,.30,.10,.10,.05,.10,.05,.25],
    layer_parallel:    [.20,.05,.05,.05,.15,.30,.10,.10],
    layer_leap:        [.10,.10,.05,.30,.05,.25,.10,.05],
    grow_linear:       [.10,.05,.05,.05,.35,.10,.15,.15],
    grow_spiral:       [.05,.15,.05,.15,.15,.05,.05,.35],
    grow_parallel:     [.25,.05,.05,.10,.25,.15,.10,.05],
    grow_leap:         [.15,.15,.10,.05,.10,.05,.25,.15]
  };

  const key=p.str+'_'+p.mov;
  const w=weights[key]||[.125,.125,.125,.125,.125,.125,.125,.125];

  // Weighted random pick
  function pickPrimitive(){
    const r=R();let cum=0;
    for(let i=0;i<w.length;i++){cum+=w[i];if(r<cum)return i;}
    return w.length-1;
  }

  // How many primitives to draw (3-5)
  const nPrimitives=3+Math.floor(R()*3);

  for(let pi=0;pi<nPrimitives;pi++){
    const prim=pickPrimitive();
    // Random position within the form's bounding area
    const px=cx+(R()-.5)*bR*1.2;
    const py=fcy+(R()-.5)*bR*1.2;

    switch(prim){

      case 0: { // STRAIGHT LINE
        const a=R()*Math.PI;
        const len=bR*(.15+R()*.45);
        const tilt=(R()-.5)*0.15;
        ST(px-Math.cos(a+tilt)*len/2,py-Math.sin(a+tilt)*len/2,
           px+Math.cos(a+tilt)*len/2,py+Math.sin(a+tilt)*len/2,A,R);
        break;
      }

      case 1: { // ARC
        const r=bR*(.08+R()*.35);
        const arcStart=R()*Math.PI*2;
        const arcSpan=Math.PI*(.4+R()*1.2);
        SA(px,py,r,arcStart,arcStart+arcSpan,A,R);
        break;
      }

      case 2: { // POLYGON
        const sides=3+Math.floor(R()*5);
        const r=bR*(.08+R()*.25);
        PG(px,py,r,sides,R()*Math.PI,A,R);
        break;
      }

      case 3: { // SINE FRAGMENT
        const amp=bR*(.06+R()*.12);
        const freq=1+R()*2;
        const len=bR*(.2+R()*.35);
        const angle=R()*Math.PI; // direction of the wave
        const cos=Math.cos(angle),sin=Math.sin(angle);
        const nSeg=12+Math.floor(R()*8);
        for(let s=0;s<nSeg;s++){
          const t1=s/nSeg,t2=(s+1)/nSeg;
          const along1=(t1-.5)*len,along2=(t2-.5)*len;
          const perp1=Math.sin(t1*freq*Math.PI)*amp;
          const perp2=Math.sin(t2*freq*Math.PI)*amp;
          ST(px+cos*along1-sin*perp1,py+sin*along1+cos*perp1,
             px+cos*along2-sin*perp2,py+sin*along2+cos*perp2,A,R);
        }
        break;
      }

      case 4: { // BRANCH
        const trunkA=-Math.PI/2+(R()-.5)*Math.PI*.8; // varied direction
        const trunkLen=bR*(.12+R()*.25);
        const ex=px+Math.cos(trunkA)*trunkLen,ey=py+Math.sin(trunkA)*trunkLen;
        ST(px,py,ex,ey,A,R);
        // 1-2 forks
        const nFork=1+Math.floor(R()*2);
        for(let f=0;f<nFork;f++){
          const fa=trunkA+(R()-.5)*.8;
          const fl=trunkLen*(.3+R()*.4);
          ST(ex,ey,ex+Math.cos(fa)*fl,ey+Math.sin(fa)*fl,A,R);
        }
        break;
      }

      case 5: { // HATCH CLUSTER
        const angle=R()*Math.PI;
        const nLines=2+Math.floor(R()*3);
        const spacing=4+R()*6;
        const hLen=bR*(.06+R()*.12);
        const cos=Math.cos(angle),sin=Math.sin(angle);
        for(let h=0;h<nLines;h++){
          const off=(h-(nLines-1)/2)*spacing;
          const hx=px-sin*off,hy=py+cos*off;
          ST(hx-cos*hLen,hy-sin*hLen,hx+cos*hLen,hy+sin*hLen,A,R);
        }
        break;
      }

      case 6: { // CROSS / STAR MARK
        const s=bR*(.04+R()*.08);
        const nArms=2+Math.floor(R()*3); // 2=cross, 3=asterisk, 4=star
        for(let a=0;a<nArms;a++){
          const angle=a*Math.PI/nArms+R()*.2;
          ST(px-Math.cos(angle)*s,py-Math.sin(angle)*s,
             px+Math.cos(angle)*s,py+Math.sin(angle)*s,A,R);
        }
        break;
      }

      case 7: { // SPIRAL FRAGMENT
        const turns=0.3+R()*0.8;
        const nPts=Math.floor(turns*20);
        const startR=bR*(.03+R()*.08);
        const endR=bR*(.12+R()*.25);
        const startA=R()*Math.PI*2;
        const dir=R()>.5?1:-1;
        let prevX=px+Math.cos(startA)*startR,prevY=py+Math.sin(startA)*startR;
        for(let i=1;i<=nPts;i++){
          const t=i/nPts;
          const a=startA+dir*t*turns*Math.PI*2;
          const r=startR+t*(endR-startR);
          const nx=px+Math.cos(a)*r,ny=py+Math.sin(a)*r;
          ST(prevX,prevY,nx,ny,A,R);
          prevX=nx;prevY=ny;
        }
        break;
      }
    }
  }

  ctx.restore();
}

// ===== STATE =====
const renderedSeeds=new Set();
const allForms=[];
let totalCount=0;

// ===== MULTI-TIER GRID SYSTEM =====
const HW_RATIO=1.35;
const GRID_TIERS=[100,200,300,400,500,600,700,800,900,1000,1200,1500,1700,2000];
const GRIDS={};
let GRID=null;
let GRID_R=65;
let currentTier=0;

function buildGrid(maxCells){
  const marginPct=0.07;
  const maxW=(W-2*MG)*(1-2*marginPct);
  const maxH=(cutY-MG)*(1-2*marginPct);
  let ellA=Math.min(maxW/2,(maxH/HW_RATIO));
  let ellB=ellA*HW_RATIO;
  if(ellB>maxH/2){ellB=maxH/2;ellA=ellB/HW_RATIO;}
  const ellCX=CX;
  const ellBottomY=cutY;
  const ellCY=ellBottomY-ellB;

  // dynR basé sur maxCells
  const ellArea=Math.PI*ellA*ellB;
  const areaPerForm=ellArea/maxCells;
  const spacing=Math.sqrt(areaPerForm/0.9);
  const dynR=Math.max(8,Math.min(65,(spacing+3)/2));
  const gap=-(dynR*0.08);
  const snapDist=2*dynR+gap;
  const rowH=snapDist*Math.sqrt(3)/2;

  // Pack hex dans ellipse simple
  const res=[];
  for(let y=ellCY-ellB+dynR;y<=ellCY+ellB-dynR;y+=rowH){
    const dy=(y-ellCY)/ellB;
    if(Math.abs(dy)>=1)continue;
    const halfW=ellA*Math.sqrt(1-dy*dy);
    const ri=Math.round((y-(ellCY-ellB))/rowH);
    const xOff=(ri%2===1)?snapDist/2:0;
    for(let x=ellCX-halfW+dynR+xOff;x<=ellCX+halfW-dynR;x+=snapDist){
      const ex=(x-ellCX)/ellA,ey=(y-ellCY)/ellB;
      if(ex*ex+ey*ey>1)continue;
      res.push({x,y,r:dynR});
    }
  }

  // SHIFT BAS — la cellule la plus basse touche exactement cutY
  if(res.length>0){
    let maxY=-Infinity;
    for(let j=0;j<res.length;j++){
      if(res[j].y+dynR>maxY) maxY=res[j].y+dynR;
    }
    const sh=ellBottomY-maxY;
    for(let j=0;j<res.length;j++) res[j].y+=sh;
  }

  // Recentrer sur CX
  if(res.length>0){
    let mx=0;for(let j=0;j<res.length;j++)mx+=res[j].x;mx/=res.length;
    const sh=CX-mx;for(let j=0;j<res.length;j++)res[j].x+=sh;
  }

  // Jitter organique — valeur absolue, côtés et haut seulement
  if(res.length>10){
    let cmx=0,cmy=0;
    for(let j=0;j<res.length;j++){cmx+=res[j].x;cmy+=res[j].y;}
    cmx/=res.length;cmy/=res.length;
    let maxDist=0;
    for(let j=0;j<res.length;j++){
      const dd=Math.sqrt((res[j].x-cmx)**2+(res[j].y-cmy)**2);
      if(dd>maxDist)maxDist=dd;
    }
    const R2=mkR(7777);
    for(let j=0;j<res.length;j++){
      const dx=res[j].x-cmx,dy=res[j].y-cmy;
      const dd=Math.sqrt(dx*dx+dy*dy);
      if(dd>maxDist*0.55){
        const angle=Math.atan2(dy,dx);
        if(angle>0.4&&angle<Math.PI-0.4) continue;
        const edgeness=(dd-maxDist*0.55)/(maxDist*0.45);
        // Jitter ABSOLU — 60px max, indépendant de dynR
        const jitAmt=60*edgeness;
        const radX=dx/Math.max(1,dd),radY=dy/Math.max(1,dd);
        const push=R2()*jitAmt;
        const randX=(R2()-.5)*jitAmt*1.2;
        const randY=(R2()-.5)*jitAmt*1.2;
        res[j].x+=radX*push+randX;
        res[j].y+=radY*push+randY;
      }
    }
  }

  // SHIFT BAS FINAL — après jitter, la cellule la plus basse touche cutY
  if(res.length>0){
    let maxY=-Infinity;
    for(let j=0;j<res.length;j++){
      if(res[j].y+dynR>maxY) maxY=res[j].y+dynR;
    }
    const sh=ellBottomY-maxY;
    for(let j=0;j<res.length;j++) res[j].y+=sh;
  }

  // Tri bottom-up — par distance au bas
  const anchorY=ellBottomY;
  res.sort((a,b)=>{
    const da=Math.sqrt((a.x-CX)**2+(a.y-anchorY)**2);
    const db=Math.sqrt((b.x-CX)**2+(b.y-anchorY)**2);
    return da-db;
  });
  for(let band=0;band<res.length;band+=8){
    const end=Math.min(band+8,res.length);
    const slice=res.slice(band,end);
    const left=slice.filter(p=>p.x<CX).sort((a,b)=>a.x-b.x);
    const right=slice.filter(p=>p.x>=CX).sort((a,b)=>b.x-a.x);
    const merged=[];let li=0,ri=0;
    while(li<left.length||ri<right.length){
      if(li<left.length)merged.push(left[li++]);
      if(ri<right.length)merged.push(right[ri++]);}
    for(let j=0;j<merged.length;j++)res[band+j]=merged[j];
  }

  return {cells:res, dynR:dynR};
}

function initGrids(){
  const g=buildGrid(GRID_TIERS[0]);
  GRIDS[GRID_TIERS[0]]=g;
  GRID=g.cells;
  GRID_R=g.dynR;
  currentTier=0;
}

function checkTierSwitch(){
  const count=allForms.length;
  const tierCap=GRID_TIERS[currentTier];
  if(count>=tierCap && currentTier<GRID_TIERS.length-1){
    currentTier++;
    const nextCap=GRID_TIERS[currentTier];
    if(!GRIDS[nextCap]) GRIDS[nextCap]=buildGrid(nextCap);
    GRID=GRIDS[nextCap].cells;
    GRID_R=GRIDS[nextCap].dynR;
    formsCtx.clearRect(0,0,W,H);
    for(let i=0;i<allForms.length;i++) drawOneForm(i);
    compositeCanvas();
    return true;
  }
  return false;
}

// ===== MEASURE MORPHOLOGY VIA OFFSCREEN SCAN =====
const BASE_SCALE=0.3;
const _mCache=new Map();
const _offCv=document.createElement('canvas');
_offCv.width=800;_offCv.height=800;
const _offCtx=_offCv.getContext('2d');

function measureForm(p){
  if(_mCache.has(p.seed))return _mCache.get(p.seed);

  // Draw on 800×800 with same transform as final render
  const realCtx=ctx;
  ctx=_offCtx;
  ctx.clearRect(0,0,800,800);
  ctx.save();
  ctx.translate(400,400);
  ctx.scale(BASE_SCALE,BASE_SCALE);
  ctx.translate(-CX,-cutY*0.6);
  drawFormSimplified(p);
  ctx.restore();
  ctx=realCtx;

  // Scan pixels
  const imgData=_offCtx.getImageData(0,0,800,800);
  const d=imgData.data;
  let sumX=0,sumY=0,cnt=0;
  const pixels=[];
  for(let y=0;y<800;y+=2){for(let x=0;x<800;x+=2){
    if(d[(y*800+x)*4+3]>10){sumX+=x;sumY+=y;cnt++;pixels.push(x,y);}
  }}
  if(cnt<3){const r={bcx:400,bcy:400,maxR:50,cnt:0};_mCache.set(p.seed,r);return r;}
  const bcx=sumX/cnt;
  const bcy=sumY/cnt;
  let maxR=0;
  for(let i=0;i<pixels.length;i+=2){
    const dx=pixels[i]-bcx,dy=pixels[i+1]-bcy;
    const dr=Math.sqrt(dx*dx+dy*dy);
    if(dr>maxR)maxR=dr;
  }
  if(maxR<5)maxR=50;

  const result={bcx,bcy,maxR,cnt};
  _mCache.set(p.seed,result);
  return result;
}

// ===== DRAW A SINGLE FORM ON THE FORMS LAYER =====
// Called incrementally — each form is drawn once, never erased
function drawFormOnLayer(formData,layoutPos,placeR){
  const p=formData.params;
  const meas=measureForm(p);
  if(meas.cnt<3)return;

  const normScale=(placeR/meas.maxR)*1.35;
  const offsetX=400-meas.bcx;
  const offsetY=400-meas.bcy;
  const rotR=mkR(p.seed+333);
  const angle=(rotR()-0.5)*0.6;

  // Draw on the offscreen forms canvas
  const realCtx=ctx;
  ctx=formsCtx;
  ctx.save();
  ctx.beginPath();ctx.rect(MG,MG,W-MG*2,H-MG*2);ctx.clip();
  ctx.translate(layoutPos.x,layoutPos.y);
  ctx.rotate(angle);
  ctx.scale(normScale,normScale);
  ctx.translate(offsetX,offsetY);
  ctx.scale(BASE_SCALE,BASE_SCALE);
  ctx.translate(-CX,-cutY*0.6);
  drawFormSimplified(p);
  ctx.restore();
  ctx=realCtx;
}

// ===== COMPOSITE — assemble fond + formes + buste + texte =====
// Lightweight: no form recalculation, just layering
function compositeCanvas(){
  // 1. Fond crème + grain
  ctx.fillStyle=`rgb(${CR})`;ctx.fillRect(0,0,W,H);
  const GR=mkR(42);for(let i=0;i<8000;i++){ctx.fillStyle=`rgba(${180+GR()*30},${175+GR()*30},${168+GR()*30},0.012)`;
    ctx.beginPath();ctx.arc(GR()*W,GR()*H,.7+GR()*.5,0,Math.PI*2);ctx.fill();}

  // 2. Formes (composite du canvas offscreen)
  ctx.drawImage(formsCv,0,0);

  // 3. Buste (conditionnel — ?bust=0 pour cacher)
  if(SHOW_BUST){
    drawBust();
    // 4. Fade at bust top
    const bVisH=bust.h*bustScale;
    const bf2=ctx.createLinearGradient(0,bustTop-30,0,bustTop+20);
    bf2.addColorStop(0,'rgba(242,237,228,0)');bf2.addColorStop(1,'rgba(242,237,228,0)');
    ctx.fillStyle=bf2;ctx.fillRect(CX-400,bustTop-30,800,50);
  }

  // 5. Frame
  ctx.strokeStyle='rgba(130,125,118,0.55)';ctx.lineWidth=1.5;ctx.strokeRect(MG,MG,W-MG*2,H-MG*2);

  // 6. Footer text (caché en mode sans buste)
  if(SHOW_BUST){
    ctx.textAlign='center';
    ctx.letterSpacing='8px';ctx.font='400 41px "DM Mono",monospace';ctx.fillStyle='rgba(42,39,37,0.6)';
    ctx.fillText('LAURIANE MOUYSSET',CX,H-MG-75);
    ctx.letterSpacing='6px';ctx.font='400 27px "DM Mono",monospace';ctx.fillStyle='rgba(122,117,108,0.5)';
    ctx.fillText('AGORA COLLECTIVE',CX,H-MG-30);
    ctx.letterSpacing='0px';ctx.textAlign='start';
  }
}

// ===== ADD FORMS =====
function addForm(params){
  const key=params.seed;
  if(renderedSeeds.has(key))return;
  renderedSeeds.add(key);
  allForms.push({params});
}

// ===== DRAW ONE FORM — incrémental sur le canvas offscreen =====
function drawOneForm(idx){
  if(!GRID||!GRID[idx]||!allForms[idx])return;
  drawFormOnLayer(allForms[idx],GRID[idx],GRID_R);
}

// ===== API FETCH =====
async function fetchForms(){
  try{
    const resp=await fetch(API_URL,{redirect:'follow'});
    const data=await resp.json();
    if(!data||!data.forms)return;
    const newForms=[];
    data.forms.forEach(f=>{
      const seed=Number(f.seed);
      if(renderedSeeds.has(seed))return;
      const params={
        str:f.q1_structure,
        mov:f.q2_mouvement,
        rhy:f.rythme||'accumulate',
        cpx:Number(f.complexite)||6,
        den:Number(f.densite)||0.5,
        mul:Number(f.multiplicite)||9,
        flip1:f.flip1===true||f.flip1==='TRUE'||f.flip1==='true',
        flip2:f.flip2===true||f.flip2==='TRUE'||f.flip2==='true',
        flip3:f.flip3===true||f.flip3==='TRUE'||f.flip3==='true',
        seed:seed
      };
      newForms.push(params);
    });
    if(newForms.length>0){
      newForms.forEach(p=>{
        addForm(p);
        if(!checkTierSwitch()){ // si pas de switch, dessiner incrémentalement
          drawOneForm(allForms.length-1);
        }
      });
      compositeCanvas();
    }
  }catch(e){
    console.warn('[agora] API fetch failed:',e);
  }
}

// ===== INIT =====
function init(){
  initGrids();
  PRESETS.forEach((p,i)=>{
    addForm(p);
    drawOneForm(i);
  });
  compositeCanvas();
  fetchForms();
  setInterval(fetchForms,REFRESH_MIN*60*1000);
}

// Wait for fonts to load
document.fonts.ready.then(init);
</script>
