<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agora collective — Forme de pensée</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');
  :root{--cream:#f2ede4;--ink:#2a2725;--mid:#7a756c;--light:#b8b3aa;--faint:#d5d0c8;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--cream);font-family:'DM Mono',monospace;color:var(--ink);
    min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;overflow:hidden;-webkit-font-smoothing:antialiased;}
  .canvas-wrap{width:100vw;height:100vh;position:relative;}
  #cv{width:100%;height:100%;display:block;object-fit:contain;}
  .overlay{position:fixed;z-index:10;pointer-events:none;}
  .top-left{top:24px;left:28px;}
  .top-right{top:24px;right:28px;text-align:right;}
  .bottom-center{bottom:20px;left:50%;transform:translateX(-50%);text-align:center;}
  .ov-title{font-family:'Instrument Serif',serif;font-size:clamp(1.2em,3vw,1.8em);font-weight:400;color:var(--ink);opacity:.7;}
  .ov-count{font-family:'DM Mono',monospace;font-size:clamp(.7em,1.8vw,1em);color:var(--mid);letter-spacing:.08em;}
  .ov-footer{font-family:'DM Mono',monospace;font-size:10px;color:var(--light);letter-spacing:.12em;text-transform:uppercase;}
  .ov-refresh{font-family:'DM Mono',monospace;font-size:9px;color:var(--light);letter-spacing:.08em;margin-top:4px;}
</style>
</head>
<body>
<div class="canvas-wrap"><canvas id="cv"></canvas></div>
<div class="overlay top-left">
  <div class="ov-title">Agora collective</div>
</div>
<div class="overlay bottom-center">
  <div class="ov-footer"></div>
</div>
<script>
// ===== CONSTANTS =====
const W=1920, H=2400, MG=72, CX=W/2, CR=[242,237,228], INK='0,0,0';
const bustScale=0.48; // 2/3 minus 30% (20+10)

const cv=document.getElementById('cv');cv.width=W;cv.height=H;
let ctx=cv.getContext('2d');

// ===== URL PARAMS =====
const urlParams=new URLSearchParams(window.location.search);
const REFRESH_MIN=parseInt(urlParams.get('refresh')||'5');

// ===== API =====
const API_URL='https://script.google.com/macros/s/AKfycbw1LKhlopH5hTxful2B0DoxvI0pgst3bOHB2hr-gt67f7qQ5I9x-A3IeWtcOAwP_ROQ/exec?action=list';

// ===== SEEDED RANDOM =====
function mkR(s){return()=>{s=(s*16807+7)%2147483647;return(s&0x7fffffff)/0x7fffffff;};}

// ===== BUST =====
function renderBust(){
  const bW=760,bH=560,off=document.createElement('canvas');off.width=bW;off.height=bH;
  const c=off.getContext('2d'),bx=bW/2,by=0;
  const nB=by+bH*.08,mY=by+bH*.18,chY=by+bH*.34,nT=chY+10,nBo=by+bH*.48,sY=by+bH*.55,bot=bH;
  const fW=110,chW=86;
  // Head
  c.fillStyle='#a09a92';c.beginPath();c.moveTo(bx-fW,by);c.lineTo(bx+fW,by);
  c.quadraticCurveTo(bx+fW+4,chY-28,bx+chW+6,chY);c.quadraticCurveTo(bx+14,chY+12,bx-2,chY+8);
  c.quadraticCurveTo(bx-18,chY+10,bx-chW,chY+2);c.quadraticCurveTo(bx-fW-4,chY-24,bx-fW,by);c.fill();
  const fg=c.createLinearGradient(bx-fW,mY,bx+fW,mY);
  fg.addColorStop(0,'rgba(180,175,168,0.15)');fg.addColorStop(.4,'rgba(180,175,168,0)');fg.addColorStop(1,'rgba(140,135,128,0.1)');
  c.fillStyle=fg;c.fill();
  // Nose
  c.fillStyle='rgba(85,80,74,0.25)';c.beginPath();c.moveTo(bx-14,by);c.quadraticCurveTo(bx-16,nB-4,bx-10,nB+6);
  c.quadraticCurveTo(bx,nB+12,bx+10,nB+6);c.quadraticCurveTo(bx+16,nB-4,bx+14,by);c.closePath();c.fill();
  c.fillStyle='rgba(70,66,60,0.28)';c.beginPath();c.ellipse(bx-11,nB+3,6,4.4,.15,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(bx+10,nB+3,6,4.4,-.1,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(85,80,74,0.1)';c.fillRect(bx-6,nB+8,12,mY-nB-12);
  // Mouth
  c.fillStyle='rgba(120,115,108,0.35)';c.beginPath();c.moveTo(bx-30,mY+2);c.quadraticCurveTo(bx-12,mY-7,bx+2,mY-4);
  c.quadraticCurveTo(bx+16,mY-6,bx+28,mY+1);c.quadraticCurveTo(bx+2,mY+4,bx-30,mY+2);c.fill();
  c.fillStyle='rgba(130,125,118,0.25)';c.beginPath();c.moveTo(bx-22,mY+5);c.quadraticCurveTo(bx,mY+18,bx+24,mY+4);
  c.quadraticCurveTo(bx,mY+9,bx-22,mY+5);c.fill();
  c.strokeStyle='rgba(75,72,66,0.28)';c.lineWidth=1.4;c.beginPath();c.moveTo(bx-30,mY+2);
  c.quadraticCurveTo(bx-6,mY-3,bx+2,mY-1);c.quadraticCurveTo(bx+16,mY-2,bx+28,mY+1);c.stroke();
  c.fillStyle='rgba(85,80,74,0.08)';c.beginPath();c.ellipse(bx-2,chY-8,chW-16,24,0,0,Math.PI*2);c.fill();
  // Neck
  const nW=38;c.fillStyle='#908a82';c.beginPath();c.moveTo(bx-nW,nT);c.lineTo(bx+nW,nT-2);
  c.lineTo(bx+nW+2,nBo);c.lineTo(bx-nW-2,nBo+2);c.closePath();c.fill();
  c.fillStyle='rgba(70,66,60,0.15)';c.beginPath();c.ellipse(bx,nT+8,nW+8,14,0,0,Math.PI);c.fill();
  // Shoulders
  c.fillStyle='#706b64';c.beginPath();c.moveTo(bx-nW-2,nBo+2);
  c.lineTo(bx-nW-35,sY-2);c.lineTo(bx-136,sY);
  c.quadraticCurveTo(bx-200,sY+8,bx-260,sY+20);c.lineTo(bx-276,bot);
  c.lineTo(bx+284,bot);c.lineTo(bx+260,sY+20);
  c.quadraticCurveTo(bx+200,sY+8,bx+136,sY);
  c.quadraticCurveTo(bx+nW+55,sY-2,bx+nW+2,nBo);c.closePath();c.fill();
  // V-neck
  c.fillStyle='#807b74';c.beginPath();c.moveTo(bx-nW-2,nBo+4);
  c.quadraticCurveTo(bx-12,nBo+40,bx,sY+30);
  c.quadraticCurveTo(bx+12,nBo+38,bx+nW+2,nBo+2);
  c.lineTo(bx+nW+2,nBo);c.quadraticCurveTo(bx+10,nBo+28,bx,sY+18);
  c.quadraticCurveTo(bx-10,nBo+30,bx-nW-2,nBo+2);c.closePath();c.fill();
  c.strokeStyle='rgba(60,57,52,0.1)';c.lineWidth=1.5;
  c.beginPath();c.moveTo(bx-100,sY+36);c.quadraticCurveTo(bx-50,sY+48,bx-12,sY+60);c.stroke();
  c.beginPath();c.moveTo(bx+88,sY+44);c.quadraticCurveTo(bx+44,sY+52,bx+12,sY+58);c.stroke();
  return{data:c.getImageData(0,0,bW,bH),w:bW,h:bH};
}
const bust=renderBust();
const bustBottom=H*.52+bust.h+bust.h*0.1; // descendu de 10%
const bustTop=bustBottom-bust.h*bustScale;
const cutY=bustTop;

function drawBust(){
  const R=mkR(999),bx=CX-bust.w*bustScale/2,by=bustTop;
  for(let i=0;i<40000;i++){const lx=R()*bust.w,ly=R()*bust.h;
    const ix=Math.floor(lx),iy=Math.floor(ly);if(ix<0||ix>=bust.w||iy<0||iy>=bust.h)continue;
    const id=(iy*bust.w+ix)*4;if(bust.data.data[id+3]<10)continue;
    const dk=1-bust.data.data[id]/255;if(R()>dk*1.4+.03)continue;
    ctx.fillStyle=`rgba(60,57,52,${.22+dk*.35})`;
    ctx.beginPath();ctx.arc(bx+lx*bustScale,by+ly*bustScale,.6+R()*.35,0,Math.PI*2);ctx.fill();}
  const bVisH=bust.h*bustScale;
  const bf=ctx.createLinearGradient(0,bustTop+bVisH-40,0,bustTop+bVisH);
  bf.addColorStop(0,'rgba(242,237,228,0)');bf.addColorStop(1,`rgb(${CR})`);
  ctx.fillStyle=bf;ctx.fillRect(CX-400,bustTop+bVisH-40,800,40);
}

// ===== STITCH PRIMITIVES — hand-drawn style =====
function ST(x1,y1,x2,y2,al,R){
  const jt=2;
  x1+=(R()-.5)*jt;y1+=(R()-.5)*jt;x2+=(R()-.5)*jt;y2+=(R()-.5)*jt;
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);if(len<1.5)return;
  const nx=dx/len,ny=dy/len;
  const bow=(R()-.5)*4;
  const tremFreq=3+R()*5;
  const tremAmp=0.5+R()*1;
  let d=0;
  while(d<len){
    const sl=Math.min(5+R()*8,len-d);
    const t=d/len;
    const w=bow*Math.sin(t*Math.PI)+Math.sin(t*tremFreq*Math.PI)*tremAmp*(0.5+R())+(R()-.5)*1;
    const de=Math.min(d+sl,len);
    const t2=de/len;
    const w2=bow*Math.sin(t2*Math.PI)+Math.sin(t2*tremFreq*Math.PI)*tremAmp*(0.5+R())+(R()-.5)*1;
    ctx.beginPath();
    ctx.moveTo(x1+nx*d+ny*w,y1+ny*d-nx*w);
    ctx.lineTo(x1+nx*de+ny*w2,y1+ny*de-nx*w2);
    ctx.strokeStyle='rgba(0,0,0,0.9)';
    ctx.lineWidth=3+R()*2;
    ctx.lineCap='round';ctx.stroke();
    d+=sl+3+R()*1.5;
  }
}
function SA(cx,cy,r,a1,a2,al,R){
  const rBase=r*(0.95+R()*0.1);
  const wobbleAmp=r*0.03+1;
  const wobbleFreq=4+R()*6;
  const steps=Math.max(10,Math.floor(Math.abs(a2-a1)*rBase/6));
  for(let i=0;i<steps;i++){
    const t1=a1+(a2-a1)*((i+R()*0.3)/steps);
    const t2=a1+(a2-a1)*((i+0.4+R()*0.4)/steps);
    const r1=rBase+Math.sin(t1*wobbleFreq)*wobbleAmp+(R()-.5)*1.5;
    const r2=rBase+Math.sin(t2*wobbleFreq)*wobbleAmp+(R()-.5)*1.5;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(t1)*r1,cy+Math.sin(t1)*r1);
    ctx.lineTo(cx+Math.cos(t2)*r2,cy+Math.sin(t2)*r2);
    ctx.strokeStyle='rgba(0,0,0,0.75)';
    ctx.lineWidth=3.5+R()*2;ctx.lineCap='round';ctx.stroke();
  }
}
function PG(cx,cy,r,sides,rot,al,R){
  const vs=[];for(let i=0;i<sides;i++){
    const a=rot+(i/sides)*Math.PI*2+(R()-.5)*.08;
    const rv=r*(0.92+R()*0.16);
    vs.push({x:cx+Math.cos(a)*rv+(R()-.5)*2,y:cy+Math.sin(a)*rv+(R()-.5)*2});}
  for(let i=0;i<sides;i++)ST(vs[i].x,vs[i].y,vs[(i+1)%sides].x,vs[(i+1)%sides].y,al,R);return vs;
}
function HT(hx,hy,r,angle,sp,al,R){
  const cos=Math.cos(angle+(R()-.5)*.06),sin=Math.sin(angle+(R()-.5)*.06);
  for(let d=-r;d<=r;d+=sp*(0.7+R()*0.6)){
    const ch=Math.sqrt(Math.max(0,r*r-d*d));if(ch<3)continue;
    const drift=(R()-.5)*1.5;const angleJit=(R()-.5)*1;
    ST(hx+cos*d-sin*ch+drift,hy+sin*d+cos*ch+angleJit,
       hx+cos*d+sin*ch-drift,hy+sin*d-cos*ch-angleJit,al,R);}
}


// ===== PARAMS =====
function makeParams(str,mov,intensity,f1,f2,f3){
  const intMap={light:{cpx:3,den:.3,mul:3},anchored:{cpx:6,den:.5,mul:9},dense:{cpx:9,den:.7,mul:18},overflow:{cpx:12,den:1,mul:27}};
  const rhyMap={classify_linear:'accumulate',classify_spiral:'ferment',classify_parallel:'bounce',classify_leap:'flash',
    connect_linear:'accumulate',connect_spiral:'bounce',connect_parallel:'flash',connect_leap:'flash',
    layer_linear:'ferment',layer_spiral:'ferment',layer_parallel:'accumulate',layer_leap:'bounce',
    grow_linear:'ferment',grow_spiral:'bounce',grow_parallel:'accumulate',grow_leap:'flash'};
  const int=intMap[intensity]||intMap.anchored;
  let seed=73;
  const vals=[str,mov,intensity];
  vals.forEach((v,i)=>{for(let c=0;c<v.length;c++)seed=(seed*31+v.charCodeAt(c)+i*137)%2147483647;});
  return{str,mov,rhy:rhyMap[str+'_'+mov]||'accumulate',cpx:int.cpx,den:int.den,mul:int.mul,
    flip1:!!f1,flip2:!!f2,flip3:!!f3,seed};
}

// ===== 192 PRESETS — 3 rounds × 16 morphologies × 4 intensities =====
const _S=['classify','connect','layer','grow'];
const _M=['linear','spiral','parallel','leap'];
const _I=['light','anchored','dense','overflow'];
const PRESETS=[];
for(let rep=0;rep<3;rep++){
  const R=mkR(12345+rep*9999);
  for(let si=0;si<4;si++)for(let mi=0;mi<4;mi++)for(let ri=0;ri<4;ri++){
  const p=makeParams(_S[si],_M[mi],_I[Math.floor(R()*4)],R()>.5,R()>.5,R()>.5);
  p.seed=(p.seed*31+rep*9999+ri*137+si*17+mi*53)%2147483647;
  PRESETS.push(p);
  }
}
// ===== 16 DISTINCT MORPHOLOGIES =====
function drawFormWith(p){
  ctx.save();
  const R=mkR(p.seed+500),cx=CX;
  const ancY=cutY+4;
  const headHW=110*bustScale;
  // Drawing zone: 3% margin inside frame on all sides, bottom = ancY
  const zM=0.03,innerW=W-2*MG,innerH=H-2*MG;
  const zoneT=MG+innerH*zM,zoneL=MG+innerW*zM,zoneR=W-MG-innerW*zM;
  const zoneW=zoneR-zoneL,zoneH=ancY-zoneT,zoneHW=zoneW/2;
  ctx.beginPath();ctx.rect(zoneL,zoneT,zoneW,zoneH+20);ctx.clip();
  // bR capped to fit zone
  const rawBR=Math.min(700+p.mul*60+p.cpx*55,1400)*(p.flip1?1.15:.88);
  const bR=Math.min(rawBR,zoneHW,zoneH*.47);
  const fcy=Math.max(zoneT+bR,Math.min(ancY-bR,zoneT+zoneH*(p.flip2?.45:.55)));
  const al=1.0;
  const f1=p.flip1,f2=p.flip2,f3=p.flip3;
  // Helper: draw horizontal line from x at ancY back to head edge if outside head
  const rootH=(x)=>{
    if(x<cx-headHW)ST(x,ancY,cx-headHW,ancY,al*0.6,R);
    else if(x>cx+headHW)ST(x,ancY,cx+headHW,ancY,al*0.6,R);};
  const key=p.str+'_'+p.mov;

  // ==========================================
  // CLASSIFY + LINEAR → SKYLINE (wide rectangles, windows, antennas)
  // ==========================================
  if(key==='classify_linear'){
    // IRREGULAR VERTICALS — tilted bars of varying heights and thicknesses
    const nB=6+Math.floor(p.mul*1.5);const totalW=Math.min(bR*1.4,zoneW);
    for(let i=0;i<nB;i++){
      const spacing=totalW/nB*(0.5+R()*1); // irregular spacing
      const bx2=cx-totalW/2+i*totalW/nB+(R()-.5)*25;
      const bh=bR*(.05+Math.pow(R(),0.6)*.9); // power curve: some very short, some very tall
      const tilt=(R()-.5)*0.09; // +-~5 degrees in radians
      const alBar=al*(.8+R()*.35);
      // Tilted vertical
      const topX=bx2+Math.sin(tilt)*bh;
      ST(bx2,ancY,topX,ancY-bh,alBar,R);
      // Occasional parallel companion (varying thickness feel)
      if(R()<p.den*.4){const ox=3+R()*6;const shortH=bh*(0.3+R()*.5);
        ST(bx2+ox,ancY,bx2+ox+Math.sin(tilt)*shortH,ancY-shortH,alBar*.5,R);}
      rootH(bx2);
    }
  }

  // ==========================================
  // CLASSIFY + SPIRAL → MANDALA (geometric star, radial symmetry, angular)
  // ==========================================
  else if(key==='classify_spiral'){
    const arms=5+Math.floor(R()*4);const nLay=4+Math.floor(p.cpx*1.5);
    // Concentric polygons with alternating rotation
    // Offset concentric polygons — each layer drifts from center
    for(let l=0;l<nLay;l++){const t=(l+1)/(nLay+1);const lr=bR*t;
      const drift=t*bR*0.08;
      const lcx=cx+(R()-.5)*drift*2,lcy=fcy+(R()-.5)*drift*2;
      const lArms=arms+Math.floor((R()-.5)*2.5); // vary sides per layer
      PG(lcx,lcy,lr,Math.max(3,lArms),l*.35+(R()-.5)*.3,al*(.8+t*.4),R);}
    // Star diagonals — connect every-other vertex of outer polygon (no radial spokes)
    const outerR=bR*.92;
    for(let i=0;i<arms;i++){const a1=(i/arms)*Math.PI*2;const a2=((i+Math.floor(arms/2))/arms)*Math.PI*2;
      ST(cx+Math.cos(a1)*outerR,fcy+Math.sin(a1)*outerR,cx+Math.cos(a2)*outerR,fcy+Math.sin(a2)*outerR,al*0.7,R);}
    // Scattered inner details
    for(let z=0;z<Math.floor(p.den*4)+1;z++){const a=R()*Math.PI*2;const d=R()*bR*.4;
      const zx=cx+Math.cos(a)*d,zy=fcy+Math.sin(a)*d;
      if(R()<.4)HT(zx,zy,bR*(.06+R()*.08),R()*Math.PI,5,al*0.7,R);
      else if(R()<.6)SA(zx,zy,bR*(.05+R()*.1),R()*Math.PI,R()*Math.PI+1.5+R(),al*0.7,R);
      else{const s=5+R()*10;ST(zx-s,zy+(R()-.5)*s,zx+s,zy+(R()-.5)*s,al*0.7,R);}}
    ST(cx,ancY,cx,fcy+bR*.5,al*0.9,R);
  }

  // ==========================================
  // CLASSIFY + PARALLEL → GRID (orthogonal lattice, filled cells)
  // ==========================================
  else if(key==='classify_parallel'){
    // ORGANIC WEB — irregular crossing lines like a net or weave
    const nLines=6+Math.floor(p.mul*.8)+Math.floor(p.cpx*.5);
    const gW=Math.min(bR*1.1,zoneW*.8);
    const gH=Math.min(bR*1.1,zoneH*.8);
    // Lines at irregular angles crossing the zone
    for(let i=0;i<nLines;i++){
      const a=R()*Math.PI; // angles from 0 to PI (not full circle, to avoid near-duplicates)
      const drift=(R()-.5)*gW*.4;
      const cos=Math.cos(a),sin=Math.sin(a);
      const len=gW*(.3+R()*.5);
      const ox=cx+drift,oy=fcy+(R()-.5)*gH*.5;
      // Each line is slightly wavy
      const pts=[];const nSeg=8+Math.floor(R()*6);
      for(let s=0;s<=nSeg;s++){const t=s/nSeg-.5;
        const wx=ox+cos*t*len+(R()-.5)*6;
        const wy=oy+sin*t*len+(R()-.5)*6;
        pts.push({x:wx,y:wy});}
      const alLine=al*(.6+R()*.3);
      for(let s=0;s<pts.length-1;s++)ST(pts[s].x,pts[s].y,pts[s+1].x,pts[s+1].y,alLine,R);
    }
    // Stem
    ST(cx,ancY,cx,fcy+gH/2,al*0.7,R);
    rootH(cx-gW/2);rootH(cx+gW/2);
  }

  // ==========================================
  // CLASSIFY + LEAP → SHARDS (sharp angular fragments, mineral)
  // ==========================================
  else if(key==='classify_leap'){
    const n=5+p.mul;const pieces=[];
    for(let i=0;i<n;i++){const a=R()*Math.PI*2;const d=15+R()*bR*.7;
      const px=cx+Math.cos(a)*d,py=fcy+Math.sin(a)*d;const pr=15+R()*bR*.16;
      const sides=3+Math.floor(R()*2); // triangles and diamonds only
      const vs=PG(px,py,pr,sides,R()*Math.PI,al*(.9+R()*.25),R);
      // Mixed internal details: fracture lines + arcs + hatches
      if(vs.length>2){ST(vs[0].x,vs[0].y,vs[Math.floor(vs.length/2)].x,vs[Math.floor(vs.length/2)].y,al*0.7,R);}
      if(R()<.35)HT(px,py,pr*.4,R()*Math.PI,5,al*0.7,R);
      else if(R()<.5)SA(px,py,pr*.5,R()*Math.PI,R()*Math.PI+Math.PI*(0.5+R()),al*0.7,R);
      else if(R()<.3){const s=pr*.3;ST(px-s,py,px+s,py,al*0.7,R);ST(px,py-s,px,py+s,al*0.7,R);}
      pieces.push({x:px,y:py});}
    // Thin fracture lines between nearby shards
    for(let i=0;i<n;i++){for(let j=i+1;j<n;j++){
      const d=Math.sqrt((pieces[i].x-pieces[j].x)**2+(pieces[i].y-pieces[j].y)**2);
      if(d<bR*.5&&R()<.4){ST(pieces[i].x,pieces[i].y,pieces[j].x,pieces[j].y,al*0.6,R);}}}
    let cl=pieces[0],cd=1e9;pieces.forEach(p2=>{const d=Math.abs(p2.y-ancY);if(d<cd){cd=d;cl=p2;}});
    ST(cx,ancY,cl.x,cl.y,al*0.9,R);
  }

  // ==========================================
  // CONNECT + LINEAR → RIVER (smooth horizontal sine waves, flowing)
  // ==========================================
  else if(key==='connect_linear'){
    // RIVER — smooth flowing sinusoidal curves
    const nW=Math.min(4,2+Math.floor(p.mul/4));
    for(let w=0;w<nW;w++){
      const amp=bR*(.15+R()*.2);const freq=1.5+p.cpx*.2+R()*.5;
      const yOff=(w-(nW-1)/2)*bR*.2;
      const pts=[];
      for(let i=0;i<=120;i++){const t=i/120;
        pts.push({x:cx-bR*.7+t*bR*1.4, y:fcy+yOff+Math.sin(t*freq*Math.PI)*amp});}
      for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,al*(.85+.3*(1-w/nW)),R);
    }
    const botPt=fcy+bR*.3;ST(cx,ancY,cx,botPt>ancY?ancY:botPt,al*0.7,R);
  }

  // ==========================================
  // CONNECT + SPIRAL → DOUBLE HELIX (two intertwining spirals, DNA)
  // ==========================================
  else if(key==='connect_spiral'){
    // DOUBLE HELIX — two intertwining spiral arms (DNA seen from above)
    const turns=1+p.cpx*.15; // keep low for readability (1-2.5 turns)
    const nPts=Math.floor(turns*40);
    const arms=[[],[]];
    for(let i=0;i<=nPts;i++){
      const t=i/nPts;
      const a=t*turns*Math.PI*2;
      const r=15+t*bR*.85;
      // Two arms offset by PI
      arms[0].push({x:cx+Math.cos(a)*r,y:fcy+Math.sin(a)*r});
      arms[1].push({x:cx+Math.cos(a+Math.PI)*r,y:fcy+Math.sin(a+Math.PI)*r});
    }
    // Draw both arms
    for(let arm=0;arm<2;arm++){
      for(let i=0;i<arms[arm].length-1;i++)
        ST(arms[arm][i].x,arms[arm][i].y,arms[arm][i+1].x,arms[arm][i+1].y,al*(.95-.15*arm),R);
    }
    // Rungs (transversal bars connecting the two arms at regular intervals)
    const rungStep=Math.max(3,Math.floor(nPts/8));
    for(let i=rungStep;i<arms[0].length;i+=rungStep+Math.floor(R()*2)){
      ST(arms[0][i].x,arms[0][i].y,arms[1][i].x,arms[1][i].y,al*0.7,R);
    }
    // Small marks at rung intersections
    for(let i=rungStep;i<arms[0].length;i+=rungStep*2){
      const mx=(arms[0][i].x+arms[1][i].x)/2,my=(arms[0][i].y+arms[1][i].y)/2;
      if(R()<.5)SA(mx,my,4+R()*6,0,Math.PI*2,al*0.7,R);
      else{const s=3+R()*4;ST(mx-s,my,mx+s,my,al*0.7,R);ST(mx,my-s,mx,my+s,al*0.7,R);}
    }
    ST(cx,ancY,cx,fcy+bR*.35,al*0.9,R);
  }

  // ==========================================
  // CONNECT + PARALLEL → CONSTELLATION (dots + fine lines, network)
  // ==========================================
  else if(key==='connect_parallel'){
    const n=8+p.mul*2;const nds=[];
    for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2+R()*.5;const d=20+R()*bR*.7;
      nds.push({x:cx+Math.cos(a)*d,y:fcy+Math.sin(a)*d});}
    // Connect by proximity
    for(let i=0;i<n;i++){const sorted=nds.map((nd,j)=>({j,d:Math.sqrt((nd.x-nds[i].x)**2+(nd.y-nds[i].y)**2)}))
      .filter(x=>x.j!==i).sort((a,b)=>a.d-b.d);
      for(let c=0;c<Math.min(3,sorted.length);c++){if(sorted[c].d<bR*.7)
        ST(nds[i].x,nds[i].y,nds[sorted[c].j].x,nds[sorted[c].j].y,al*0.7,R);}}
    // Mixed node details: circles, polygons, hatches, crosses — different per node
    nds.forEach(nd=>{const t=R();
      if(t<.3){SA(nd.x,nd.y,5+R()*6,0,Math.PI*2,al*0.9,R);const s=3+R()*4;ST(nd.x-s,nd.y,nd.x+s,nd.y,al*0.9,R);ST(nd.x,nd.y-s,nd.x,nd.y+s,al*0.9,R);}
      else if(t<.55){PG(nd.x,nd.y,6+R()*10,3+Math.floor(R()*3),R()*Math.PI,al*0.9,R);}
      else if(t<.75){HT(nd.x,nd.y,6+R()*8,R()*Math.PI,4,al*0.7,R);}
      else{SA(nd.x,nd.y,4+R()*8,R()*Math.PI,R()*Math.PI+Math.PI*(0.6+R()*.8),al*0.9,R);
        const s=5+R()*6;ST(nd.x-s,nd.y-(R()-.5)*s,nd.x+s,nd.y+(R()-.5)*s,al*0.7,R);}});
    let cl=nds[0],cd=1e9;nds.forEach(nd=>{const d=Math.abs(nd.y-ancY);if(d<cd){cd=d;cl=nd;}});
    ST(cx,ancY,cl.x,cl.y,al*0.9,R);
  }

  // ==========================================
  // CONNECT + LEAP → ARCHIPELAGO (round islands, organic connections)
  // ==========================================
  else if(key==='connect_leap'){
    const n=5+p.mul;const cells=[];
    for(let i=0;i<n;i++){const a=R()*Math.PI*2;const d=R()*bR*.7;
      const cr=25+R()*bR*.14;const ccx=cx+Math.cos(a)*d,ccy=fcy+Math.sin(a)*d;
      // Double concentric circles
      // Mixed island shapes: some circular, some angular, some hatched
      if(R()<.6){SA(ccx,ccy,cr,0,Math.PI*2,al*(.9+R()*.2),R);SA(ccx,ccy,cr*.6,0,Math.PI*2,al*0.7,R);}
      else{PG(ccx,ccy,cr,4+Math.floor(R()*3),R()*Math.PI,al*(.95+R()*.2),R);}
      // Mixed internal fill
      if(p.den>.4){for(let j=0;j<3+Math.floor(R()*3);j++){
        const ia=R()*Math.PI*2;const ir=R()*cr*.4;const fx=ccx+Math.cos(ia)*ir,fy=ccy+Math.sin(ia)*ir;
        if(R()<.5){ctx.beginPath();ctx.arc(fx,fy,2+R()*3,0,Math.PI*2);ctx.fillStyle=`rgba(${INK},${al*0.7})`;ctx.fill();}
        else{ST(fx-3-R()*4,fy,fx+3+R()*4,fy,al*0.7,R);}}}
      cells.push({x:ccx,y:ccy,r:cr});}
    // Curved arcs connecting nearby islands
    for(let i=0;i<cells.length;i++){for(let j=i+1;j<cells.length;j++){
      const d=Math.sqrt((cells[i].x-cells[j].x)**2+(cells[i].y-cells[j].y)**2);
      if(d<cells[i].r+cells[j].r+80){
        const mx=(cells[i].x+cells[j].x)/2+(R()-.5)*40;
        const my=(cells[i].y+cells[j].y)/2+(R()-.5)*40;
        ST(cells[i].x,cells[i].y,mx,my,al*0.7,R);ST(mx,my,cells[j].x,cells[j].y,al*0.7,R);}}}
    ST(cx,ancY,cx,fcy+bR*.35,al*0.9,R);
  }

  // ==========================================
  // LAYER + LINEAR → PEAKS (sharp triangular mountains, angular)
  // ==========================================
  else if(key==='layer_linear'){
    const nRanges=3+Math.floor(p.cpx);const totalH=Math.min(bR*1.4,zoneH);
    for(let rng=0;rng<nRanges;rng++){
      const t=rng/nRanges;const baseY=ancY-t*totalH*.7;
      const nPeaks=2+Math.floor(R()*3);const w=Math.min(bR*(.6+t*.5),zoneHW);
      const pts=[{x:cx-w,y:baseY}];
      for(let pk=0;pk<nPeaks;pk++){
        const peakX=cx-w+(pk+.5)*w*2/nPeaks+(R()-.5)*40;
        const peakH=bR*(.15+R()*.35)*(1+t*.5);
        pts.push({x:peakX,y:baseY-peakH});
        if(pk<nPeaks-1)pts.push({x:peakX+w/nPeaks*(.3+R()*.4),y:baseY-peakH*.2-R()*20});}
      pts.push({x:cx+w,y:baseY});
      // Draw mountain silhouette
      for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,al*(.8+t*.4),R);
      // Hatching inside mountain bodies
      if(p.den>.3&&R()<.6){const mid=pts[Math.floor(pts.length/2)];
        HT(mid.x,baseY-20-R()*30,bR*(.05+R()*.1),R()*.3,5,al*0.7,R);}
    }
    // Snow caps: tiny hatches at the very top peaks
    for(let i=0;i<2+Math.floor(R()*2);i++){
      const px=cx+(R()-.5)*bR*.6;const py=fcy-bR*.2+R()*bR*.3;
      ST(px-4,py,px+4,py,al*0.7,R);}
    // Horizontal connections from base mountain edges to head
    const baseW=bR*.6;
    rootH(cx-baseW);rootH(cx+baseW);
  }

  // ==========================================
  // LAYER + SPIRAL → TOPOGRAPHIC (organic wobbly contours, map-like)
  // ==========================================
  else if(key==='layer_spiral'){
    const nRings=Math.min(8,4+Math.floor(p.cpx*0.5));
    for(let i=0;i<nRings;i++){const r=bR*(.08+(i/nRings)*.85);const wobble=3+R()*5;
      const pts=[];for(let j=0;j<=60;j++){const a=(j/60)*Math.PI*2;
        const wr=r+Math.sin(a*(3+i%3))*wobble+Math.cos(a*(5+i%2))*wobble*.5;
        pts.push({x:cx+Math.cos(a)*wr,y:fcy+Math.sin(a)*wr});}
      for(let j=0;j<pts.length-1;j++)ST(pts[j].x,pts[j].y,pts[j+1].x,pts[j+1].y,al*(.6+.05*i),R);}
    // Angular interruptions — break the pure ring pattern
    for(let i=0;i<2+Math.floor(p.cpx*.5);i++){const a=R()*Math.PI*2,d=bR*(.15+R()*.5);
      const px=cx+Math.cos(a)*d,py=fcy+Math.sin(a)*d;
      PG(px,py,12+R()*25,3+Math.floor(R()*3),R()*Math.PI,al*0.7,R);}
    // Scattered elevation marks + hatched zones
    for(let i=0;i<3+Math.floor(p.den*3);i++){const a=R()*Math.PI*2,d=R()*bR*.5;
      const ex=cx+Math.cos(a)*d,ey=fcy+Math.sin(a)*d;
      if(R()<.5){ST(ex-3,ey,ex+3,ey,al*0.9,R);ST(ex,ey-3,ex,ey+3,al*0.9,R);}
      else{HT(ex,ey,8+R()*12,R()*Math.PI,5,al*0.7,R);}}
    // Stray radial lines that cut across rings
    for(let i=0;i<Math.floor(p.den*2)+1;i++){const a=R()*Math.PI*2;
      ST(cx+Math.cos(a)*bR*.1,fcy+Math.sin(a)*bR*.1,cx+Math.cos(a)*bR*(.5+R()*.3),fcy+Math.sin(a)*bR*(.5+R()*.3),al*0.6,R);}
    ST(cx,ancY,cx,fcy+bR*.6,al*0.9,R);
  }

  // ==========================================
  // LAYER + PARALLEL → TOTEMS (narrow carved poles with internal symbols)
  // ==========================================
  else if(key==='layer_parallel'){
    // TEXTURED VERTICALS — single central lines with internal textures, no rectangular contours
    const nTot=Math.min(4,2+Math.floor(p.mul/3));const totW=bR*.04;
    const totemXs=[];
    for(let ti=0;ti<nTot;ti++){
      const tx=cx+(ti-(nTot-1)/2)*totW*8;const totH=Math.min(bR*(.9+R()*.5),zoneH*.95);
      totemXs.push(tx);
      // Single central vertical line
      ST(tx,ancY,tx,ancY-totH,al*0.9,R);
      // Internal textures along the line
      const nSec=3+Math.floor(p.cpx*.8);
      for(let s=0;s<nSec;s++){const sy=ancY-totH*(s+1)/(nSec+1);
        const secH=totH/(nSec+1);
        if(R()<.5){HT(tx+(R()-.5)*3,sy+secH*.3,totW*.8,R()*Math.PI,4,al*0.6,R);}
        else{SA(tx+(R()-.5)*4,sy+secH*.35,totW*.6,R()*Math.PI,R()*Math.PI+Math.PI*(.4+R()*.4),al*0.6,R);}}
    }
    // Store totem positions for post-clip connection
    p._totemXs=totemXs;
  }

  // ==========================================
  // LAYER + LEAP → STRATA (horizontal offset slabs, tectonic)
  // ==========================================
  else if(key==='layer_leap'){
    // STRATA — interrupted horizontal lines at varying heights, like geological cuts
    const nSlabs=6+Math.floor(p.cpx*1.2);
    const spanH=Math.min(bR*1.3,zoneH*.8);
    for(let i=0;i<nSlabs;i++){
      const t=i/nSlabs;
      const y=Math.max(zoneT+10,fcy-bR*.6)+t*spanH;
      const ox=(R()-.5)*60;
      const w=Math.min(bR*(.12+R()*.35),zoneHW*.7);
      const alLine=al*(.7+t*.3);
      const wav=2+R()*4;const freq=1+R()*2;
      // Main wavy horizontal line — may be interrupted
      const nSeg=12+Math.floor(R()*8);
      let drawing=true;
      for(let s=0;s<nSeg;s++){
        const t1=s/nSeg,t2=(s+1)/nSeg;
        if(R()<.12)drawing=!drawing; // interrupt or resume
        if(!drawing)continue;
        const x1=cx+ox-w+t1*w*2,x2=cx+ox-w+t2*w*2;
        const y1=y+Math.sin(t1*freq*Math.PI)*wav+(R()-.5)*2;
        const y2=y+Math.sin(t2*freq*Math.PI)*wav+(R()-.5)*2;
        ST(x1,y1,x2,y2,alLine,R);
      }
      // Occasional parallel echo line (close, shorter)
      if(R()<p.den*.6){
        const ey=y+4+R()*6;const ew=w*(.3+R()*.4);const eox=ox+(R()-.5)*30;
        ST(cx+eox-ew,ey+(R()-.5)*2,cx+eox+ew,ey+(R()-.5)*2,alLine*.5,R);}
    }
    ST(cx,ancY,cx,fcy+bR*.5,al*0.7,R);
  }

  // ==========================================
  // GROW + LINEAR → TREE (single trunk, branching upward)
  // ==========================================
  else if(key==='grow_linear'){
    const maxD=Math.max(2,1+Math.floor(p.cpx*.4));const brN=Math.max(2,Math.min(3,p.mul<3?2:3));
    function br(bx2,by2,a,d,lm){if(d>maxD)return;
      const len=(maxD-d+1)*(bR*0.22)*lm*(.8+R()*.4);
      const ex=bx2+Math.cos(a)*len,ey=by2+Math.sin(a)*len;
      ST(bx2,by2,ex,ey,al*(.7+.3*(1-d/maxD)),R);
      // Terminal details
      if(d===maxD){if(p.den>.4){SA(ex,ey,5+R()*10,0,Math.PI*2,al*0.7,R);}
        else{const s=5;ST(ex-s,ey-s,ex+s,ey+s,al*0.7,R);ST(ex+s,ey-s,ex-s,ey+s,al*0.7,R);}}
      for(let b=0;b<brN;b++){const na=a+(b-(brN-1)/2)*.25+(R()-.5)*.06;br(ex,ey,na,d+1,.85+R()*.1);}}
    br(cx,ancY,-Math.PI/2+(R()-.5)*.1,0,1);
    if(p.cpx>2){br(cx-12,ancY,-Math.PI/2-.22,1,.5);br(cx+12,ancY,-Math.PI/2+.22,1,.5);}
  }

  // ==========================================
  // GROW + SPIRAL → FERN (curling fronds, organic spirals)
  // ==========================================
  else if(key==='grow_spiral'){
    const nFronds=2+Math.floor(p.mul/2);
    for(let f=0;f<nFronds;f++){
      const baseA=-Math.PI/2+(f-(nFronds-1)/2)*.35+(R()-.5)*.1;
      const mainLen=Math.min(bR*(.7+R()*.3),zoneH*.85);const curl=(R()>.5?1:-1)*.6;
      const pts=[];let px2=cx,py2=ancY;
      for(let i=0;i<=30;i++){const t=i/30;
        const a=baseA+curl*t*t;const step=mainLen/30;
        px2+=Math.cos(a)*step;py2+=Math.sin(a)*step;pts.push({x:px2,y:py2});}
      for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,al*(.9+.3*(1-f/nFronds)),R);
      // Side leaflets — alternating
      for(let i=3;i<pts.length;i+=2){const pt=pts[i];const prev=pts[i-1];
        const da=Math.atan2(pt.y-prev.y,pt.x-prev.x);const side=(i%4<2)?1:-1;
        const la=da+side*.7;const ll=12+R()*25*(1-i/pts.length);
        const lx=pt.x+Math.cos(la)*ll,ly=pt.y+Math.sin(la)*ll;
        ST(pt.x,pt.y,lx,ly,al*0.9,R);
        if(R()<p.den*.5)SA(lx,ly,3+R()*4,0,Math.PI*2,al*0.7,R);}
      // Spiral tip (fiddle-head)
      const tip=pts[pts.length-1];const tipA=baseA+curl;
      SA(tip.x+Math.cos(tipA)*12,tip.y+Math.sin(tipA)*12,8+R()*8,0,Math.PI*1.5,al*0.9,R);
    }
  }

  // ==========================================
  // GROW + PARALLEL → GRASS FIELD (many thin vertical stems, prairie)
  // ==========================================
  else if(key==='grow_parallel'){
    const nStems=12+p.mul*4;const fieldW=Math.min(bR*1.3,zoneW);
    for(let i=0;i<nStems;i++){const sx=cx-fieldW/2+R()*fieldW;const sh=Math.min(bR*(.25+R()*.85),zoneH*.95);
      const sway=(R()-.5)*.25;const pts=[];
      for(let j=0;j<=10;j++){const t=j/10;
        pts.push({x:sx+Math.sin(t*Math.PI+sway)*sh*.06+sway*t*25,y:ancY-t*sh});}
      for(let j=0;j<pts.length-1;j++)ST(pts[j].x,pts[j].y,pts[j+1].x,pts[j+1].y,al*(.7+R()*.4),R);
      // Top detail
      if(R()<p.den){const top=pts[pts.length-1];
        ST(top.x,top.y,top.x+(R()-.5)*16,top.y-5-R()*12,al*0.9,R);}
      if(sh>bR*.5&&R()<.5){const mid=pts[5];
        ST(mid.x,mid.y,mid.x+12+R()*18,mid.y-8-R()*12,al*0.7,R);}
      // Mixed top details: circles, polygons, hatches instead of just lines
      if(R()<.3){const top=pts[pts.length-1];SA(top.x,top.y-5,4+R()*8,0,Math.PI*2,al*0.7,R);}
      if(R()<.15){const top=pts[pts.length-1];PG(top.x,top.y-8,5+R()*10,3+Math.floor(R()*3),R()*Math.PI,al*0.7,R);}
    }
    // Horizontal bridges connecting stems
    for(let i=0;i<Math.floor(p.den*3)+1;i++){const y=ancY-bR*(.2+R()*.5);const hw=fieldW*(.1+R()*.2);
      SA(cx+(R()-.5)*fieldW*.3,y,hw,R()*.5,R()*.5+Math.PI*(.5+R()),al*0.6,R);}
    // Ground scatter: marks + tiny polygons
    for(let i=0;i<Math.floor(p.den*8)+2;i++){const gx=cx+(R()-.5)*fieldW;
      if(R()<.6)ST(gx-4,ancY+R()*3,gx+4,ancY+R()*3,al*0.6,R);
      else PG(gx,ancY-2-R()*8,3+R()*5,3,R()*Math.PI,al*0.6,R);}
    // Continuous baseline + horizontal connections to head
    ST(cx-fieldW/2,ancY,cx+fieldW/2,ancY,al*0.6,R);
    rootH(cx-fieldW/2);rootH(cx+fieldW/2);
  }

  // ==========================================
  // GROW + LEAP → DANDELION (central burst + floating seed-puffs with wind trails)
  // ==========================================
  else if(key==='grow_leap'){
    // Central starburst
    const nRays=8+Math.floor(p.mul*1.5);
    for(let i=0;i<nRays;i++){const a=(i/nRays)*Math.PI*2+R()*.15;
      const rl=bR*(.2+R()*.2);
      ST(cx+Math.cos(a)*5,fcy+Math.sin(a)*5,cx+Math.cos(a)*rl,fcy+Math.sin(a)*rl,al*0.9,R);}
    SA(cx,fcy,bR*.08,0,Math.PI*2,al*0.9,R);
    // Floating seeds — round puffs with trailing curved lines
    const nSeeds=4+Math.floor(p.mul);
    for(let i=0;i<nSeeds;i++){const a=R()*Math.PI*2;const d=bR*(.35+R()*.45);
      const sx=cx+Math.cos(a)*d,sy=fcy+Math.sin(a)*d;
      SA(sx,sy,5+R()*7,0,Math.PI*2,al*0.9,R);
      // Tiny radiating filaments
      for(let f=0;f<4+Math.floor(R()*3);f++){const fa=R()*Math.PI*2;const fl=6+R()*10;
        ST(sx+Math.cos(fa)*3,sy+Math.sin(fa)*3,sx+Math.cos(fa)*fl,sy+Math.sin(fa)*fl,al*0.7,R);}
      // Wind trail — curved line back toward center
      const mx=sx+(cx-sx)*.4+(R()-.5)*40;const my=sy+(fcy-sy)*.4+(R()-.5)*40;
      ST(sx,sy,mx,my,al*0.6,R);ST(mx,my,cx+Math.cos(a)*bR*.15,fcy+Math.sin(a)*bR*.15,al*0.6,R);}
    // Stem
    ST(cx,ancY,cx,fcy+bR*.06,al*0.9,R);
  }

  // ===== FALLBACK =====
  else{
    PG(cx,fcy,bR*.6,5,R(),al*0.9,R);PG(cx,fcy,bR*.3,4,R(),al*0.9,R);
    ST(cx,ancY,cx,fcy+bR*.4,al*0.9,R);
  }

  // ===== ROOT CONNECTION — all lines trace back to head =====
  if(key!=='layer_parallel'){
    ST(cx-headHW,ancY,cx+headHW,ancY,al*0.7,R);
    const fanW=Math.min(bR*.5,zoneHW);
    if(fanW>headHW){
      ST(cx-headHW,ancY,cx-fanW,ancY-bR*.12,al*0.6,R);
      ST(cx+headHW,ancY,cx+fanW,ancY-bR*.12,al*0.6,R);
    }
  }

  // ===== FLIP-BASED OVERLAY =====
  if(f2){for(let i=0;i<4;i++){const r=bR*(.25+i*.2);SA(cx,fcy,r,R()*Math.PI,R()*Math.PI+Math.PI*(.6+R()*.5),al*0.6,R);}}

  // ===== GLOBAL OVERLAYS (rhythm) =====
  if(p.rhy==='flash'){const n=5+Math.floor(R()*5);for(let i=0;i<n;i++){const a=R()*Math.PI*2;
    ST(cx+Math.cos(a)*bR*.2,fcy+Math.sin(a)*bR*.2,cx+Math.cos(a)*bR*(.7+R()*.2),fcy+Math.sin(a)*bR*(.7+R()*.2),al*0.6,R);}}
  if(p.rhy==='bounce'){for(let i=0;i<3+Math.floor(R()*3);i++){const a=R()*Math.PI*2;
    SA(cx,fcy,bR*(.15+R()*.2),a,a+.5+R()*.6,al*0.6,R);}}
  if(p.rhy==='ferment'){HT(cx,fcy,bR*.06,R()*Math.PI,6,al*0.6,R);}
  if(p.rhy==='accumulate'){for(let i=0;i<Math.floor(p.den*18)+6;i++){const a=R()*Math.PI*2,d=R()*bR*.6;
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,fcy+Math.sin(a)*d,1.5+R()*1.2,0,Math.PI*2);
    ctx.fillStyle=`rgba(${INK},${al*0.6})`;ctx.fill();}}
  ctx.restore();

  // POST-CLIP: draw connections to bust OUTSIDE the clip region
  // For totems and any form that needs to visually touch ancY
  if(key==='layer_parallel'&&p._totemXs){
    const R2=mkR(p.seed+999);
    p._totemXs.forEach(tx=>{
      // Short vertical stub from ancY downward (into bust zone, visible)
      ST(tx,ancY+10,tx,ancY-30,0.9,R2);
      // Horizontal connection to head center if outside head width
      if(tx<cx-headHW)ST(tx,ancY,cx-headHW,ancY,0.6,R2);
      else if(tx>cx+headHW)ST(tx,ancY,cx+headHW,ancY,0.6,R2);
    });
  }
}

// ===== SIMPLIFIED MORPHOLOGIES FOR AGORA — silhouettes, uniform weight =====
// Each form: 5-12 traits, ALL at rgba(0,0,0,0.85), no variation
function drawFormSimplified(p){
  ctx.save();
  const R=mkR(p.seed+500),cx=CX;
  const ancY=cutY+4;
  const zM=0.03,innerW=W-2*MG,innerH=H-2*MG;
  const zoneT=MG+innerH*zM,zoneL=MG+innerW*zM,zoneR=W-MG-innerW*zM;
  const zoneW=zoneR-zoneL,zoneH=ancY-zoneT,zoneHW=zoneW/2;
  ctx.beginPath();ctx.rect(zoneL,zoneT,zoneW,zoneH+20);ctx.clip();
  const rawBR=Math.min(700+p.mul*60+p.cpx*55,1400)*(p.flip1?1.15:.88);
  const bR=Math.min(rawBR,zoneHW,zoneH*.47);
  const fcy=Math.max(zoneT+bR,Math.min(ancY-bR,zoneT+zoneH*(p.flip2?.45:.55)));
  const A=0.85; // uniform opacity for ALL traits
  const key=p.str+'_'+p.mov;

  // --- CLASSIFY_LINEAR: crest line + 3 vertical bars (~8 traits)
  if(key==='classify_linear'){
    const nB=6;const totalW=Math.min(bR*1.3,zoneW);const pts=[];
    for(let i=0;i<nB;i++){const bx=cx-totalW/2+i*totalW/nB+(R()-.5)*15;
      const bh=bR*(.15+Math.pow(R(),0.6)*.7);pts.push({x:bx,y:ancY-bh});
      if(i%2===0)ST(bx,ancY,bx,ancY-bh,A,R);}
    for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,A,R);
  }
  // --- CLASSIFY_SPIRAL: outer polygon + inner polygon (~10 traits)
  else if(key==='classify_spiral'){
    const arms=5+Math.floor(R()*3);
    PG(cx+(R()-.5)*bR*0.05,fcy+(R()-.5)*bR*0.05,bR*0.85,arms,R()*0.5,A,R);
    PG(cx+(R()-.5)*bR*0.08,fcy+(R()-.5)*bR*0.08,bR*0.45,arms,R()*0.8,A,R);
  }
  // --- CLASSIFY_PARALLEL: 6 crossing lines (~6 traits)
  else if(key==='classify_parallel'){
    const gW=Math.min(bR*0.9,zoneW*.6);
    for(let i=0;i<6;i++){const a=R()*Math.PI;const len=gW*(.3+R()*.35);
      const ox=cx+(R()-.5)*gW*.25,oy=fcy+(R()-.5)*bR*.35;
      ST(ox-Math.cos(a)*len/2,oy-Math.sin(a)*len/2,ox+Math.cos(a)*len/2,oy+Math.sin(a)*len/2,A,R);}
  }
  // --- CLASSIFY_LEAP: 3 fragment contours (~9 traits)
  else if(key==='classify_leap'){
    for(let i=0;i<3;i++){const a=R()*Math.PI*2;const d=15+R()*bR*.5;
      const px=cx+Math.cos(a)*d,py=fcy+Math.sin(a)*d;const pr=20+R()*bR*.12;
      PG(px,py,pr,3+Math.floor(R()*2),R()*Math.PI,A,R);}
  }
  // --- CONNECT_LINEAR: 2 sinusoidal curves + stem (~7 traits)
  else if(key==='connect_linear'){
    for(let w=0;w<2;w++){
      const amp=bR*(.12+R()*.12);const freq=1.5+R()*.4;const yOff=(w-0.5)*bR*.12;
      const pts=[];for(let i=0;i<=60;i++){const t=i/60;
        pts.push({x:cx-bR*.6+t*bR*1.2,y:fcy+yOff+Math.sin(t*freq*Math.PI)*amp});}
      for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,A,R);}
    ST(cx,ancY,cx,fcy+bR*.25,A,R);
  }
  // --- CONNECT_SPIRAL: two spiral arms (~8 traits)
  else if(key==='connect_spiral'){
    const turns=0.8+p.cpx*.1;const nPts=Math.floor(turns*25);
    for(let arm=0;arm<2;arm++){const pts=[];
      for(let i=0;i<=nPts;i++){const t=i/nPts;const a=t*turns*Math.PI*2+arm*Math.PI;
        const r=15+t*bR*.75;pts.push({x:cx+Math.cos(a)*r,y:fcy+Math.sin(a)*r});}
      for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,A,R);}
  }
  // --- CONNECT_PARALLEL: 6 nodes + 5-6 connecting lines (~11 traits)
  else if(key==='connect_parallel'){
    const n=6;const nds=[];
    for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2+R()*.4;const d=20+R()*bR*.5;
      nds.push({x:cx+Math.cos(a)*d,y:fcy+Math.sin(a)*d});}
    for(let i=0;i<n;i++){const j=(i+1)%n;ST(nds[i].x,nds[i].y,nds[j].x,nds[j].y,A,R);}
    nds.forEach(nd=>{ctx.beginPath();ctx.arc(nd.x,nd.y,3+R()*3,0,Math.PI*2);
      ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fill();});
  }
  // --- CONNECT_LEAP: 3-4 island contours (~8 traits)
  else if(key==='connect_leap'){
    const n=3+Math.floor(R()*2);
    for(let i=0;i<n;i++){const a=R()*Math.PI*2;const d=R()*bR*.5;
      const cr=20+R()*bR*.1;const ccx=cx+Math.cos(a)*d,ccy=fcy+Math.sin(a)*d;
      SA(ccx,ccy,cr,0,Math.PI*2,A,R);}
    ST(cx,ancY,cx,fcy+bR*.25,A,R);
  }
  // --- LAYER_LINEAR: crest line + second range (~10 traits)
  else if(key==='layer_linear'){
    for(let rng=0;rng<2;rng++){
      const nPeaks=3+Math.floor(R()*2);const w=Math.min(bR*(.6+rng*.2),zoneHW);
      const baseOff=rng*bR*.25;const pts=[{x:cx-w,y:fcy+baseOff}];
      for(let pk=0;pk<nPeaks;pk++){const peakX=cx-w+(pk+.5)*w*2/nPeaks+(R()-.5)*25;
        const peakH=bR*(.15+R()*.3);pts.push({x:peakX,y:fcy-peakH+baseOff});
        if(pk<nPeaks-1)pts.push({x:peakX+w/nPeaks*.5,y:fcy+baseOff-R()*10});}
      pts.push({x:cx+w,y:fcy+baseOff});
      for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,A,R);}
  }
  // --- LAYER_SPIRAL: 3 contour rings (~9 traits)
  else if(key==='layer_spiral'){
    for(let i=0;i<3;i++){const r=bR*(.4+(i/3)*.5);const wobble=3+R()*3;
      const pts=[];for(let j=0;j<=40;j++){const a=(j/40)*Math.PI*2;
        const wr=r+Math.sin(a*(3+i%3))*wobble;pts.push({x:cx+Math.cos(a)*wr,y:fcy+Math.sin(a)*wr});}
      for(let j=0;j<pts.length-1;j++)ST(pts[j].x,pts[j].y,pts[j+1].x,pts[j+1].y,A,R);}
  }
  // --- LAYER_PARALLEL: 3-4 vertical lines + cross marks (~8 traits)
  else if(key==='layer_parallel'){
    const nTot=3+Math.floor(R()*2);const totW=bR*.04;
    for(let ti=0;ti<nTot;ti++){const tx=cx+(ti-(nTot-1)/2)*totW*8;
      const totH=Math.min(bR*(.7+R()*.3),zoneH*.85);
      ST(tx,ancY,tx,ancY-totH,A,R);
      // Small cross mark at midpoint
      const my=ancY-totH*.5;ST(tx-8,my,tx+8,my,A,R);}
  }
  // --- LAYER_LEAP: 5 wavy horizontal lines (~5 traits)
  else if(key==='layer_leap'){
    const nSlabs=5;const spanH=Math.min(bR*1.0,zoneH*.6);
    for(let i=0;i<nSlabs;i++){const t=i/nSlabs;
      const y=fcy-bR*.3+t*spanH;const ox=(R()-.5)*40;
      const w=Math.min(bR*(.12+R()*.25),zoneHW*.5);const wav=2+R()*2;const freq=1+R();
      const pts=[];for(let s=0;s<=10;s++){const st=s/10;
        pts.push({x:cx+ox-w+st*w*2,y:y+Math.sin(st*freq*Math.PI)*wav+(R()-.5)*1.5});}
      for(let s=0;s<pts.length-1;s++)ST(pts[s].x,pts[s].y,pts[s+1].x,pts[s+1].y,A,R);}
  }
  // --- GROW_LINEAR: trunk + 2 levels of branches (~7 traits)
  else if(key==='grow_linear'){
    function br(bx2,by2,a,d,lm){if(d>2)return;
      const len=(3-d)*(bR*0.18)*lm*(.8+R()*.3);
      const ex=bx2+Math.cos(a)*len,ey=by2+Math.sin(a)*len;
      ST(bx2,by2,ex,ey,A,R);
      for(let b=0;b<2;b++){const na=a+(b-0.5)*.35+(R()-.5)*.1;br(ex,ey,na,d+1,.8);}}
    br(cx,ancY,-Math.PI/2+(R()-.5)*.1,0,1);
  }
  // --- GROW_SPIRAL: 2-3 fronds (~6 traits)
  else if(key==='grow_spiral'){
    const nFronds=2+Math.floor(R());
    for(let f=0;f<nFronds;f++){
      const baseA=-Math.PI/2+(f-(nFronds-1)/2)*.35+(R()-.5)*.1;
      const mainLen=Math.min(bR*(.5+R()*.25),zoneH*.7);const curl=(R()>.5?1:-1)*.45;
      const pts=[];let px2=cx,py2=ancY;
      for(let i=0;i<=20;i++){const t=i/20;const a=baseA+curl*t*t;const step=mainLen/20;
        px2+=Math.cos(a)*step;py2+=Math.sin(a)*step;pts.push({x:px2,y:py2});}
      for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,A,R);
      // One side branch at mid-point
      const mid=pts[10];const ma=baseA+curl*.25+(R()-.5)*.5;const ml=mainLen*.2;
      ST(mid.x,mid.y,mid.x+Math.cos(ma)*ml,mid.y+Math.sin(ma)*ml,A,R);}
  }
  // --- GROW_PARALLEL: 8 stems (~8 traits)
  else if(key==='grow_parallel'){
    const nStems=8;const fieldW=Math.min(bR*1.0,zoneW*.8);
    for(let i=0;i<nStems;i++){const sx=cx-fieldW/2+R()*fieldW;
      const sh=Math.min(bR*(.2+R()*.6),zoneH*.8);const sway=(R()-.5)*.15;
      ST(sx,ancY,sx+sway*sh,ancY-sh,A,R);}
  }
  // --- GROW_LEAP: circle + 8 rays + stem (~10 traits)
  else if(key==='grow_leap'){
    const nRays=8;
    SA(cx,fcy,bR*.1,0,Math.PI*2,A,R);
    for(let i=0;i<nRays;i++){const a=(i/nRays)*Math.PI*2+R()*.12;
      const rl=bR*(.12+R()*.18);
      ST(cx+Math.cos(a)*bR*.05,fcy+Math.sin(a)*bR*.05,cx+Math.cos(a)*rl,fcy+Math.sin(a)*rl,A,R);}
    ST(cx,ancY,cx,fcy+bR*.08,A,R);
  }
  // --- FALLBACK ---
  else{PG(cx,fcy,bR*.5,5,R(),A,R);}

  ctx.restore();
}

// ===== STATE =====
const renderedSeeds=new Set();
const allForms=[];
let totalCount=0;

// ===== PERSISTENT LAYOUT: SEED + NICHE GROWTH WITH ELLIPSE REJECTION =====
const PLACE_R=65;
const PLACE_GAP=-10;
const SEED_COUNT=20;
const HW_RATIO=1.6;
const layoutCache=[];
let seedA_stored=0,seedB_stored=0,ovalCY_stored=0;

function packSeed(){
  const r=PLACE_R,gap=PLACE_GAP;
  const spacing=2*r+gap;
  const rowH=spacing*Math.sqrt(3)/2;
  const headTopY=cutY+10;
  const areaPerForm=spacing*spacing*0.9;
  const totalArea=SEED_COUNT*areaPerForm;
  let sA=Math.sqrt(totalArea/(Math.PI*HW_RATIO));
  let sB=sA*HW_RATIO;
  let oCY=headTopY-sB;
  function pack(a,b,cy){
    const res=[];const sY=cy-b;
    for(let y=sY+r;y<=cy+b-r;y+=rowH){
      const dy=(y-cy)/b;if(Math.abs(dy)>=1)continue;
      const halfW=a*Math.sqrt(1-dy*dy);
      const ri=Math.round((y-sY)/rowH);
      const xOff=(ri%2===1)?spacing/2:0;
      for(let x=CX-halfW+r+xOff;x<=CX+halfW-r;x+=spacing){
        const ex=(x-CX)/a,ey=(y-cy)/b;
        if(ex*ex+ey*ey<=1){if(y+r>headTopY)continue;
          res.push({x,y,size:270});if(res.length>=SEED_COUNT)return res;}
      }if(res.length>=SEED_COUNT)return res;
    }return res;
  }
  let res=pack(sA,sB,oCY);
  let tries=0;
  while(res.length<SEED_COUNT&&tries<15){sA*=1.1;sB*=1.1;oCY=headTopY-sB;res=pack(sA,sB,oCY);tries++;}
  if(res.length>SEED_COUNT)res=res.slice(0,SEED_COUNT);
  // Shift bottom to headTopY
  if(res.length>0){
    let lo=-Infinity;for(let j=0;j<res.length;j++){if(res[j].y+r>lo)lo=res[j].y+r;}
    const sh=headTopY-lo;for(let j=0;j<res.length;j++)res[j].y+=sh;
    oCY+=sh;
  }
  // Center on CX
  if(res.length>0){
    let mx=0;for(let j=0;j<res.length;j++)mx+=res[j].x;mx/=res.length;
    const sh=CX-mx;for(let j=0;j<res.length;j++)res[j].x+=sh;
  }
  seedA_stored=sA;seedB_stored=sB;ovalCY_stored=oCY;
  return res;
}

function findNextNichePosition(placed){
  const r=PLACE_R,gap=PLACE_GAP;
  const snapDist=2*r+gap;
  const headTopY=cutY+10;
  const topBound=MG+50;
  const R2=mkR(42+placed.length*7);

  // Center of mass
  let cmx=0,cmy=0;
  for(let j=0;j<placed.length;j++){cmx+=placed[j].x;cmy+=placed[j].y;}
  cmx/=placed.length;cmy/=placed.length;

  // Growing ellipse for rejection
  const nAfterSeed=placed.length-SEED_COUNT;
  const layerEst=nAfterSeed/8;
  const tA=seedA_stored+layerEst*snapDist*0.6;
  const tB=tA*HW_RATIO;

  // Find perimeter forms
  const perimForms=[];
  for(let j=0;j<placed.length;j++){
    let isPerim=false;
    for(let da=0;da<12;da++){
      const ca=(da/12)*Math.PI*2;
      const cx2=placed[j].x+Math.cos(ca)*snapDist;
      const cy2=placed[j].y+Math.sin(ca)*snapDist;
      let hasN=false;
      for(let k=0;k<placed.length;k++){if(k===j)continue;
        const dx=cx2-placed[k].x,dy=cy2-placed[k].y;
        if(Math.sqrt(dx*dx+dy*dy)<r*0.8){hasN=true;break;}}
      if(!hasN){isPerim=true;break;}
    }
    if(isPerim)perimForms.push(j);
  }
  if(perimForms.length===0)perimForms.push(placed.length-1);

  let bestNx=CX,bestNy=cmy-snapDist,bestScore=-99999;

  for(let pi=0;pi<perimForms.length;pi++){
    const pf=placed[perimForms[pi]];
    const outAngle=Math.atan2(pf.y-cmy,pf.x-cmx);
    for(let ai=-4;ai<=4;ai++){
      const tryAngle=outAngle+ai*0.25;
      const nx=pf.x+Math.cos(tryAngle)*snapDist;
      const ny=pf.y+Math.sin(tryAngle)*snapDist;

      if(ny+r>headTopY)continue;
      if(nx-r<MG||nx+r>W-MG)continue;
      if(ny-r<topBound)continue;

      // STRICT ellipse rejection
      const ex=(nx-CX)/tA,ey=(ny-ovalCY_stored)/tB;
      if(ex*ex+ey*ey>1.05)continue;

      let tooClose=false,touchCount=0,spacingOk=true;
      for(let j=0;j<placed.length;j++){
        const dx2=nx-placed[j].x,dy2=ny-placed[j].y;
        const dd2=Math.sqrt(dx2*dx2+dy2*dy2);
        if(dd2<snapDist*0.7){tooClose=true;break;}
        if(dd2<=snapDist*1.15){touchCount++;
          if(dd2<snapDist*0.85||dd2>snapDist*1.15)spacingOk=false;}
      }
      if(tooClose||!spacingOk)continue;

      // Scoring
      let curMaxW=0,curMaxH=0;
      for(let j=0;j<placed.length;j++){
        const dxa=Math.abs(placed[j].x-cmx)+r;
        const dya=Math.abs(placed[j].y-cmy)+r;
        if(dxa>curMaxW)curMaxW=dxa;if(dya>curMaxH)curMaxH=dya;}
      const growF=1+0.3/Math.sqrt(placed.length);
      let gA=curMaxW*growF,gB=curMaxH*growF;
      const curRat=gB/Math.max(1,gA);
      if(curRat<HW_RATIO*0.85)gB=gA*HW_RATIO;
      if(curRat>HW_RATIO*1.15)gA=gB/HW_RATIO;
      const cosT=Math.cos(tryAngle),sinT=Math.sin(tryAngle);
      const targetDist=gA*gB/Math.sqrt(Math.pow(gB*cosT,2)+Math.pow(gA*sinT,2));
      const myDist=Math.sqrt(Math.pow(nx-cmx,2)+Math.pow(ny-cmy,2));
      const gapToTarget=targetDist-myDist;

      const touchBonus=touchCount*3;
      const newCmx=(cmx*placed.length+nx)/(placed.length+1);
      const cmxDrift=Math.abs(newCmx-CX)/(W/2);
      const score=gapToTarget+touchBonus+R2()*r*0.3-cmxDrift*10;

      if(score>bestScore){bestScore=score;bestNx=nx;bestNy=ny;}
    }
  }

  return {x:bestNx,y:bestNy,size:270};
}

function computeCanopyLayout(count){
  // Ensure all positions up to count
  while(layoutCache.length<count){
    const idx=layoutCache.length;
    if(idx===0){
      const seedPos=packSeed();
      for(let j=0;j<seedPos.length;j++)layoutCache.push(seedPos[j]);
    }else if(idx>=SEED_COUNT){
      layoutCache.push(findNextNichePosition(layoutCache));
    }
  }
  return layoutCache.slice(0,count);
}

// ===== MEASURE MORPHOLOGY VIA OFFSCREEN SCAN =====
const BASE_SCALE=0.3;
const _mCache=new Map();
const _offCv=document.createElement('canvas');
_offCv.width=800;_offCv.height=800;
const _offCtx=_offCv.getContext('2d');

function measureForm(p){
  if(_mCache.has(p.seed))return _mCache.get(p.seed);

  // Draw on 800×800 with same transform as final render
  const realCtx=ctx;
  ctx=_offCtx;
  ctx.clearRect(0,0,800,800);
  ctx.save();
  ctx.translate(400,400);
  ctx.scale(BASE_SCALE,BASE_SCALE);
  ctx.translate(-CX,-cutY*0.6);
  drawFormSimplified(p);
  ctx.restore();
  ctx=realCtx;

  // Scan pixels
  const imgData=_offCtx.getImageData(0,0,800,800);
  const d=imgData.data;
  let sumX=0,sumY=0,cnt=0;
  const pixels=[];
  for(let y=0;y<800;y+=2){for(let x=0;x<800;x+=2){
    if(d[(y*800+x)*4+3]>10){sumX+=x;sumY+=y;cnt++;pixels.push(x,y);}
  }}
  if(cnt<3){const r={bcx:400,bcy:400,maxR:50,cnt:0};_mCache.set(p.seed,r);return r;}
  const bcx=sumX/cnt;
  const bcy=sumY/cnt;
  let maxR=0;
  for(let i=0;i<pixels.length;i+=2){
    const dx=pixels[i]-bcx,dy=pixels[i+1]-bcy;
    const dr=Math.sqrt(dx*dx+dy*dy);
    if(dr>maxR)maxR=dr;
  }
  if(maxR<5)maxR=50;

  const result={bcx,bcy,maxR,cnt};
  _mCache.set(p.seed,result);
  return result;
}

// ===== DRAW MAIN CANVAS =====
function drawMainCanvas(){
  ctx.fillStyle=`rgb(${CR})`;ctx.fillRect(0,0,W,H);
  const GR=mkR(42);for(let i=0;i<8000;i++){ctx.fillStyle=`rgba(${180+GR()*30},${175+GR()*30},${168+GR()*30},0.012)`;
    ctx.beginPath();ctx.arc(GR()*W,GR()*H,.7+GR()*.5,0,Math.PI*2);ctx.fill();}

  const count=allForms.length;
  const layout=computeCanopyLayout(count);

  // --- ZOOM — ancré sur headTopY, comprime vers le haut ---
  const headTopY=cutY+10;
  const topLimit=MG+80;
  let globalScale=1.0;
  if(layout.length>0){
    let minY=Infinity;
    for(let j=0;j<layout.length;j++){
      if(layout[j].y-PLACE_R<minY)minY=layout[j].y-PLACE_R;
    }
    const availH=headTopY-topLimit;
    const contentH=headTopY-minY;
    if(contentH>availH)globalScale=availH/contentH;
  }

  ctx.save();
  ctx.beginPath();ctx.rect(MG,MG,W-MG*2,H-MG*2);ctx.clip();
  ctx.translate(CX,headTopY);
  ctx.scale(globalScale,globalScale);
  ctx.translate(-CX,-headTopY);

  for(let i=0;i<count;i++){
    const lp=layout[i];
    const form=allForms[i];
    if(!form||!lp)continue;
    const p=form.params;

    const meas=measureForm(p);
    if(meas.cnt<3)continue;

    const normScale=PLACE_R/meas.maxR;
    const offsetX=400-meas.bcx;
    const offsetY=400-meas.bcy;

    const rotR=mkR(p.seed+333);
    const angle=(rotR()-0.5)*0.6;

    ctx.save();
    ctx.translate(lp.x,lp.y);
    ctx.rotate(angle);
    ctx.scale(normScale,normScale);
    ctx.translate(offsetX,offsetY);
    ctx.scale(BASE_SCALE,BASE_SCALE);
    ctx.translate(-CX,-cutY*0.6);
    drawFormSimplified(p);
    ctx.restore();
  }

  ctx.restore(); // end frame clip + scale

  // Draw bust OUTSIDE the scale (fixed position)
  drawBust();

  // Fade at bust top
  const bVisH=bust.h*bustScale;
  const bf2=ctx.createLinearGradient(0,bustTop-30,0,bustTop+20);
  bf2.addColorStop(0,'rgba(242,237,228,0)');bf2.addColorStop(1,'rgba(242,237,228,0)');
  ctx.fillStyle=bf2;ctx.fillRect(CX-400,bustTop-30,800,50);

  // Frame
  ctx.strokeStyle='rgba(130,125,118,0.55)';ctx.lineWidth=1.5;ctx.strokeRect(MG,MG,W-MG*2,H-MG*2);

  // Footer text — 3 lines, no overlap
  ctx.textAlign='center';
  ctx.font='italic 400 28px "Instrument Serif",serif';ctx.fillStyle='rgba(122,117,108,0.6)';
  ctx.fillText('Agora collective : Volte geste',CX,H-MG-130);
  ctx.letterSpacing='8px';ctx.font='400 41px "DM Mono",monospace';ctx.fillStyle='rgba(42,39,37,0.6)';
  ctx.fillText('LAURIANE MOUYSSET',CX,H-MG-75);
  ctx.letterSpacing='6px';ctx.font='400 27px "DM Mono",monospace';ctx.fillStyle='rgba(122,117,108,0.5)';
  ctx.fillText('COLLECTION AGORA',CX,H-MG-30);
  ctx.letterSpacing='0px';ctx.textAlign='start';

}

// ===== ADD FORMS =====
function addForm(params){
  const key=params.seed;
  if(renderedSeeds.has(key))return;
  renderedSeeds.add(key);
  allForms.push({params});
}

// ===== PROGRESSIVE INITIAL RENDER =====
function renderProgressively(formsList,idx,onDone){
  if(idx>=formsList.length){if(onDone)onDone();return;}
  addForm(formsList[idx]);
  drawMainCanvas();
  requestAnimationFrame(()=>renderProgressively(formsList,idx+1,onDone));
}

// ===== API FETCH =====
async function fetchForms(){
  try{
    const resp=await fetch(API_URL,{redirect:'follow'});
    const data=await resp.json();
    if(!data||!data.forms)return;
    totalCount=data.total||data.forms.length;
    const newForms=[];
    data.forms.forEach(f=>{
      const seed=Number(f.seed);
      if(renderedSeeds.has(seed))return;
      const params={
        str:f.q1_structure,
        mov:f.q2_mouvement,
        rhy:f.rythme||'accumulate',
        cpx:Number(f.complexite)||6,
        den:Number(f.densite)||0.5,
        mul:Number(f.multiplicite)||9,
        flip1:f.flip1===true||f.flip1==='TRUE'||f.flip1==='true',
        flip2:f.flip2===true||f.flip2==='TRUE'||f.flip2==='true',
        flip3:f.flip3===true||f.flip3==='TRUE'||f.flip3==='true',
        seed:seed
      };
      newForms.push(params);
    });
    if(newForms.length>0){
      renderProgressively(newForms,0,()=>drawMainCanvas());
    }
  }catch(e){
    console.warn('[agora] API fetch failed:',e);
  }
}

// ===== INIT =====
function init(){
  // Start with presets so page is never empty
  totalCount=PRESETS.length;
  renderProgressively(PRESETS,0,()=>{
    drawMainCanvas();
    // Then fetch real data
    fetchForms();
    // Set up polling
    setInterval(fetchForms,REFRESH_MIN*60*1000);
  });
}

// Wait for fonts to load
document.fonts.ready.then(init);
</script>
