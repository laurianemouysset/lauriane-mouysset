<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agora collective — Forme de pensée</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');
  :root{--cream:#f2ede4;--ink:#2a2725;--mid:#7a756c;--light:#b8b3aa;--faint:#d5d0c8;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--cream);font-family:'DM Mono',monospace;color:var(--ink);
    min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;overflow:hidden;-webkit-font-smoothing:antialiased;}
  .canvas-wrap{width:100vw;height:100vh;position:relative;}
  #cv{width:100%;height:100%;display:block;object-fit:contain;}
  .overlay{position:fixed;z-index:10;pointer-events:none;}
  .top-left{top:24px;left:28px;}
  .top-right{top:24px;right:28px;text-align:right;}
  .bottom-center{bottom:20px;left:50%;transform:translateX(-50%);text-align:center;}
  .ov-title{font-family:'Instrument Serif',serif;font-size:clamp(1.2em,3vw,1.8em);font-weight:400;color:var(--ink);opacity:.7;}
  .ov-count{font-family:'DM Mono',monospace;font-size:clamp(.7em,1.8vw,1em);color:var(--mid);letter-spacing:.08em;}
  .ov-footer{font-family:'DM Mono',monospace;font-size:10px;color:var(--light);letter-spacing:.12em;text-transform:uppercase;}
  .ov-refresh{font-family:'DM Mono',monospace;font-size:9px;color:var(--light);letter-spacing:.08em;margin-top:4px;}
</style>
</head>
<body>
<div class="canvas-wrap"><canvas id="cv"></canvas></div>
<div class="overlay top-left">
  <div class="ov-title">Agora collective</div>
</div>
<div class="overlay bottom-center">
  <div class="ov-footer">Lauriane Mouysset · Collection Agora</div>
</div>
<script>
// ===== CONSTANTS =====
const W=1920, H=2400, MG=72, CX=W/2, CR=[242,237,228], INK='0,0,0';
const bustScale=2/3;

const cv=document.getElementById('cv');cv.width=W;cv.height=H;
let ctx=cv.getContext('2d');

// ===== URL PARAMS =====
const urlParams=new URLSearchParams(window.location.search);
const REFRESH_MIN=parseInt(urlParams.get('refresh')||'5');

// ===== API =====
const API_URL='https://script.google.com/macros/s/AKfycbw1LKhlopH5hTxful2B0DoxvI0pgst3bOHB2hr-gt67f7qQ5I9x-A3IeWtcOAwP_ROQ/exec?action=list';

// ===== SEEDED RANDOM =====
function mkR(s){return()=>{s=(s*16807+7)%2147483647;return(s&0x7fffffff)/0x7fffffff;};}

// ===== BUST =====
function renderBust(){
  const bW=760,bH=560,off=document.createElement('canvas');off.width=bW;off.height=bH;
  const c=off.getContext('2d'),bx=bW/2,by=0;
  const nB=by+bH*.08,mY=by+bH*.18,chY=by+bH*.34,nT=chY+10,nBo=by+bH*.48,sY=by+bH*.55,bot=bH;
  const fW=110,chW=86;
  // Head
  c.fillStyle='#a09a92';c.beginPath();c.moveTo(bx-fW,by);c.lineTo(bx+fW,by);
  c.quadraticCurveTo(bx+fW+4,chY-28,bx+chW+6,chY);c.quadraticCurveTo(bx+14,chY+12,bx-2,chY+8);
  c.quadraticCurveTo(bx-18,chY+10,bx-chW,chY+2);c.quadraticCurveTo(bx-fW-4,chY-24,bx-fW,by);c.fill();
  const fg=c.createLinearGradient(bx-fW,mY,bx+fW,mY);
  fg.addColorStop(0,'rgba(180,175,168,0.15)');fg.addColorStop(.4,'rgba(180,175,168,0)');fg.addColorStop(1,'rgba(140,135,128,0.1)');
  c.fillStyle=fg;c.fill();
  // Nose
  c.fillStyle='rgba(85,80,74,0.25)';c.beginPath();c.moveTo(bx-14,by);c.quadraticCurveTo(bx-16,nB-4,bx-10,nB+6);
  c.quadraticCurveTo(bx,nB+12,bx+10,nB+6);c.quadraticCurveTo(bx+16,nB-4,bx+14,by);c.closePath();c.fill();
  c.fillStyle='rgba(70,66,60,0.28)';c.beginPath();c.ellipse(bx-11,nB+3,6,4.4,.15,0,Math.PI*2);c.fill();
  c.beginPath();c.ellipse(bx+10,nB+3,6,4.4,-.1,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(85,80,74,0.1)';c.fillRect(bx-6,nB+8,12,mY-nB-12);
  // Mouth
  c.fillStyle='rgba(120,115,108,0.35)';c.beginPath();c.moveTo(bx-30,mY+2);c.quadraticCurveTo(bx-12,mY-7,bx+2,mY-4);
  c.quadraticCurveTo(bx+16,mY-6,bx+28,mY+1);c.quadraticCurveTo(bx+2,mY+4,bx-30,mY+2);c.fill();
  c.fillStyle='rgba(130,125,118,0.25)';c.beginPath();c.moveTo(bx-22,mY+5);c.quadraticCurveTo(bx,mY+18,bx+24,mY+4);
  c.quadraticCurveTo(bx,mY+9,bx-22,mY+5);c.fill();
  c.strokeStyle='rgba(75,72,66,0.28)';c.lineWidth=1.4;c.beginPath();c.moveTo(bx-30,mY+2);
  c.quadraticCurveTo(bx-6,mY-3,bx+2,mY-1);c.quadraticCurveTo(bx+16,mY-2,bx+28,mY+1);c.stroke();
  c.fillStyle='rgba(85,80,74,0.08)';c.beginPath();c.ellipse(bx-2,chY-8,chW-16,24,0,0,Math.PI*2);c.fill();
  // Neck
  const nW=38;c.fillStyle='#908a82';c.beginPath();c.moveTo(bx-nW,nT);c.lineTo(bx+nW,nT-2);
  c.lineTo(bx+nW+2,nBo);c.lineTo(bx-nW-2,nBo+2);c.closePath();c.fill();
  c.fillStyle='rgba(70,66,60,0.15)';c.beginPath();c.ellipse(bx,nT+8,nW+8,14,0,0,Math.PI);c.fill();
  // Shoulders
  c.fillStyle='#706b64';c.beginPath();c.moveTo(bx-nW-2,nBo+2);
  c.lineTo(bx-nW-35,sY-2);c.lineTo(bx-136,sY);
  c.quadraticCurveTo(bx-200,sY+8,bx-260,sY+20);c.lineTo(bx-276,bot);
  c.lineTo(bx+284,bot);c.lineTo(bx+260,sY+20);
  c.quadraticCurveTo(bx+200,sY+8,bx+136,sY);
  c.quadraticCurveTo(bx+nW+55,sY-2,bx+nW+2,nBo);c.closePath();c.fill();
  // V-neck
  c.fillStyle='#807b74';c.beginPath();c.moveTo(bx-nW-2,nBo+4);
  c.quadraticCurveTo(bx-12,nBo+40,bx,sY+30);
  c.quadraticCurveTo(bx+12,nBo+38,bx+nW+2,nBo+2);
  c.lineTo(bx+nW+2,nBo);c.quadraticCurveTo(bx+10,nBo+28,bx,sY+18);
  c.quadraticCurveTo(bx-10,nBo+30,bx-nW-2,nBo+2);c.closePath();c.fill();
  c.strokeStyle='rgba(60,57,52,0.1)';c.lineWidth=1.5;
  c.beginPath();c.moveTo(bx-100,sY+36);c.quadraticCurveTo(bx-50,sY+48,bx-12,sY+60);c.stroke();
  c.beginPath();c.moveTo(bx+88,sY+44);c.quadraticCurveTo(bx+44,sY+52,bx+12,sY+58);c.stroke();
  return{data:c.getImageData(0,0,bW,bH),w:bW,h:bH};
}
const bust=renderBust();
const bustBottom=H*.52+bust.h;
const bustTop=bustBottom-bust.h*bustScale;
const cutY=bustTop;

function drawBust(){
  const R=mkR(999),bx=CX-bust.w*bustScale/2,by=bustTop;
  for(let i=0;i<40000;i++){const lx=R()*bust.w,ly=R()*bust.h;
    const ix=Math.floor(lx),iy=Math.floor(ly);if(ix<0||ix>=bust.w||iy<0||iy>=bust.h)continue;
    const id=(iy*bust.w+ix)*4;if(bust.data.data[id+3]<10)continue;
    const dk=1-bust.data.data[id]/255;if(R()>dk*1.4+.03)continue;
    ctx.fillStyle=`rgba(60,57,52,${.22+dk*.35})`;
    ctx.beginPath();ctx.arc(bx+lx*bustScale,by+ly*bustScale,.6+R()*.35,0,Math.PI*2);ctx.fill();}
  const bVisH=bust.h*bustScale;
  const bf=ctx.createLinearGradient(0,bustTop+bVisH-40,0,bustTop+bVisH);
  bf.addColorStop(0,'rgba(242,237,228,0)');bf.addColorStop(1,`rgb(${CR})`);
  ctx.fillStyle=bf;ctx.fillRect(CX-400,bustTop+bVisH-40,800,40);
}

// ===== STITCH PRIMITIVES — hand-drawn style =====
function ST(x1,y1,x2,y2,al,R){
  const jt=8;
  x1+=(R()-.5)*jt;y1+=(R()-.5)*jt;x2+=(R()-.5)*jt;y2+=(R()-.5)*jt;
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);if(len<1.5)return;
  const nx=dx/len,ny=dy/len;
  const bow=(R()-.5)*12;
  const tremFreq=3+R()*5;
  const tremAmp=2+R()*5;
  const pressure=0.7+R()*0.6;
  const alBase=al*pressure;
  let d=0;
  while(d<len){
    const sl=Math.min(5+R()*8,len-d);
    const t=d/len;
    const w=bow*Math.sin(t*Math.PI) + Math.sin(t*tremFreq*Math.PI)*tremAmp*(0.5+R()) + (R()-.5)*3;
    const de=Math.min(d+sl,len);
    const t2=de/len;
    const w2=bow*Math.sin(t2*Math.PI) + Math.sin(t2*tremFreq*Math.PI)*tremAmp*(0.5+R()) + (R()-.5)*3;
    ctx.beginPath();
    ctx.moveTo(x1+nx*d+ny*w, y1+ny*d-nx*w);
    ctx.lineTo(x1+nx*de+ny*w2, y1+ny*de-nx*w2);
    const segAl=alBase*(0.7+R()*0.5);
    ctx.strokeStyle=`rgba(${INK},${Math.min(segAl,1)})`;
    ctx.lineWidth=3.5+R()*4;
    ctx.lineCap='round';ctx.stroke();
    d+=sl+2+R()*5;
  }
  if(len>30&&R()<0.3){
    const off=(R()-.5)*6;let d2=len*R()*0.3;const d2end=d2+len*(0.2+R()*0.3);
    while(d2<d2end&&d2<len){
      const sl=Math.min(6+R()*6,d2end-d2);
      const t=d2/len;const w=bow*Math.sin(t*Math.PI)+off+(R()-.5)*4;
      ctx.beginPath();
      ctx.moveTo(x1+nx*d2+ny*w,y1+ny*d2-nx*w);
      const de=Math.min(d2+sl,len);const t2=de/len;
      const w2=bow*Math.sin(t2*Math.PI)+off+(R()-.5)*4;
      ctx.lineTo(x1+nx*de+ny*w2,y1+ny*de-nx*w2);
      ctx.strokeStyle=`rgba(${INK},${alBase*0.4})`;ctx.lineWidth=2+R()*3;ctx.lineCap='round';ctx.stroke();
      d2+=sl+3+R()*4;}
  }
}
function SA(cx,cy,r,a1,a2,al,R){
  const rBase=r*(0.9+R()*0.2);
  const pressure=0.7+R()*0.6;const alBase=al*pressure;
  const wobbleAmp=r*0.08+3;
  const wobbleFreq=4+R()*6;
  const steps=Math.max(10,Math.floor(Math.abs(a2-a1)*rBase/6));
  for(let i=0;i<steps;i++){
    const t1=a1+(a2-a1)*((i+R()*0.3)/steps);
    const t2=a1+(a2-a1)*((i+0.4+R()*0.4)/steps);
    const r1=rBase+Math.sin(t1*wobbleFreq)*wobbleAmp+(R()-.5)*5;
    const r2=rBase+Math.sin(t2*wobbleFreq)*wobbleAmp+(R()-.5)*5;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(t1)*r1,cy+Math.sin(t1)*r1);
    ctx.lineTo(cx+Math.cos(t2)*r2,cy+Math.sin(t2)*r2);
    const segAl=alBase*(0.65+R()*0.5);
    ctx.strokeStyle=`rgba(${INK},${Math.min(segAl,1)})`;
    ctx.lineWidth=3+R()*4;ctx.lineCap='round';ctx.stroke();
  }
}
function PG(cx,cy,r,sides,rot,al,R){
  const vs=[];for(let i=0;i<sides;i++){
    const a=rot+(i/sides)*Math.PI*2+(R()-.5)*.15;
    const rv=r*(0.85+R()*0.3);
    vs.push({x:cx+Math.cos(a)*rv+(R()-.5)*6, y:cy+Math.sin(a)*rv+(R()-.5)*6});}
  for(let i=0;i<sides;i++)ST(vs[i].x,vs[i].y,vs[(i+1)%sides].x,vs[(i+1)%sides].y,al,R);return vs;
}
function HT(hx,hy,r,angle,sp,al,R){
  const cos=Math.cos(angle+(R()-.5)*.1),sin=Math.sin(angle+(R()-.5)*.1);
  for(let d=-r;d<=r;d+=sp*(0.6+R()*0.8)){
    const ch=Math.sqrt(Math.max(0,r*r-d*d));if(ch<3)continue;
    const drift=(R()-.5)*6;const angleJit=(R()-.5)*4;
    ST(hx+cos*d-sin*ch+drift,hy+sin*d+cos*ch+angleJit,
       hx+cos*d+sin*ch-drift,hy+sin*d-cos*ch-angleJit,al,R);}
}

// ===== PARAMS =====
function makeParams(str,mov,intensity,f1,f2,f3){
  const intMap={light:{cpx:3,den:.3,mul:3},anchored:{cpx:6,den:.5,mul:9},dense:{cpx:9,den:.7,mul:18},overflow:{cpx:12,den:1,mul:27}};
  const rhyMap={classify_linear:'accumulate',classify_spiral:'ferment',classify_parallel:'bounce',classify_leap:'flash',
    connect_linear:'accumulate',connect_spiral:'bounce',connect_parallel:'flash',connect_leap:'flash',
    layer_linear:'ferment',layer_spiral:'ferment',layer_parallel:'accumulate',layer_leap:'bounce',
    grow_linear:'ferment',grow_spiral:'bounce',grow_parallel:'accumulate',grow_leap:'flash'};
  const int=intMap[intensity]||intMap.anchored;
  let seed=73;
  const vals=[str,mov,intensity];
  vals.forEach((v,i)=>{for(let c=0;c<v.length;c++)seed=(seed*31+v.charCodeAt(c)+i*137)%2147483647;});
  return{str,mov,rhy:rhyMap[str+'_'+mov]||'accumulate',cpx:int.cpx,den:int.den,mul:int.mul,
    flip1:!!f1,flip2:!!f2,flip3:!!f3,seed};
}

// ===== 50 PRESETS =====
const _S=['classify','connect','layer','grow'];
const _M=['linear','spiral','parallel','leap'];
const _I=['light','anchored','dense','overflow'];
const PRESETS=[];
{const R=mkR(12345);
for(let i=0;i<50;i++){
  PRESETS.push(makeParams(_S[Math.floor(R()*4)],_M[Math.floor(R()*4)],_I[Math.floor(R()*4)],R()>.5,R()>.5,R()>.5));
}}

// ===== 16 DISTINCT MORPHOLOGIES =====
function drawFormWith(p){
  ctx.save();
  const R=mkR(p.seed+500),cx=CX;
  const ancY=cutY+4;
  const headHW=110*bustScale;
  const zM=0.03,innerW=W-2*MG,innerH=H-2*MG;
  const zoneT=MG+innerH*zM,zoneL=MG+innerW*zM,zoneR=W-MG-innerW*zM;
  const zoneW=zoneR-zoneL,zoneH=ancY-zoneT,zoneHW=zoneW/2;
  ctx.beginPath();ctx.rect(zoneL,zoneT,zoneW,zoneH);ctx.clip();
  const rawBR=Math.min(600+p.mul*56+p.cpx*50,1200)*(p.flip1?1.15:.88);
  const bR=Math.min(rawBR,zoneHW,zoneH*.47);
  const fcy=Math.max(zoneT+bR,Math.min(ancY-bR,zoneT+zoneH*(p.flip2?.45:.55)));
  const al=.82+p.den*.15;
  const f1=p.flip1,f2=p.flip2,f3=p.flip3;
  const rootH=(x)=>{
    if(x<cx-headHW)ST(x,ancY,cx-headHW,ancY,al*.3,R);
    else if(x>cx+headHW)ST(x,ancY,cx+headHW,ancY,al*.3,R);};
  const key=p.str+'_'+p.mov;

  // ==========================================
  // CLASSIFY + LINEAR -> SKYLINE
  // ==========================================
  if(key==='classify_linear'){
    const nB=5+Math.floor(p.mul*1.2);const totalW=Math.min(bR*1.5,zoneW);
    for(let i=0;i<nB;i++){
      const bw=totalW/nB*(.4+R()*.6);const bh=bR*(.3+R()*.7);
      const bx2=cx-totalW/2+i*totalW/nB+R()*8;const by2=ancY-bh;
      ST(bx2,ancY,bx2,by2,al*.65,R);ST(bx2,by2,bx2+bw,by2,al*.65,R);
      ST(bx2+bw,by2,bx2+bw,ancY,al*.65,R);
      rootH(bx2);rootH(bx2+bw);
      const nF=2+Math.floor(bh/55);const nWi=1+Math.floor(bw/35);
      for(let f=0;f<nF;f++){const fy=by2+bh*.08+f*(bh*.84/nF);
        if(p.den>.4)ST(bx2+3,fy,bx2+bw-3,fy,al*.18,R);
        for(let w=0;w<nWi;w++){const wx=bx2+bw*.12+w*(bw*.76/Math.max(1,nWi-1));
          if(R()<p.den){const ws=6+R()*5;ctx.beginPath();ctx.rect(wx-ws/2,fy+3,ws,ws*1.2);
            ctx.strokeStyle=`rgba(${INK},${al*.3})`;ctx.lineWidth=1.8;ctx.stroke();}}}
      if(R()<.5){ST(bx2+bw/2,by2,bx2+bw/2,by2-15-R()*35,al*.45,R);
        if(R()<.5)ST(bx2+bw/2-8,by2-8,bx2+bw/2+8,by2-8,al*.3,R);}
    }
    ST(cx-totalW/2,ancY,cx+totalW/2,ancY,al*.15,R);
  }

  // ==========================================
  // CLASSIFY + SPIRAL -> MANDALA
  // ==========================================
  else if(key==='classify_spiral'){
    const arms=5+Math.floor(R()*4);const nLay=4+Math.floor(p.cpx*1.5);
    for(let l=0;l<nLay;l++){const t=(l+1)/(nLay+1);const lr=bR*t;
      PG(cx,fcy,lr,arms,l*.35,al*(.3+t*.35),R);}
    const outerR=bR*.92;
    for(let i=0;i<arms;i++){const a1=(i/arms)*Math.PI*2;const a2=((i+Math.floor(arms/2))/arms)*Math.PI*2;
      ST(cx+Math.cos(a1)*outerR,fcy+Math.sin(a1)*outerR,cx+Math.cos(a2)*outerR,fcy+Math.sin(a2)*outerR,al*.3,R);}
    for(let i=0;i<arms*2;i++){const a=(i/(arms*2))*Math.PI*2;
      ST(cx+Math.cos(a)*bR*.05,fcy+Math.sin(a)*bR*.05,cx+Math.cos(a)*bR*.95,fcy+Math.sin(a)*bR*.95,al*.2,R);}
    for(let z=0;z<Math.floor(p.den*4)+1;z++){const a=R()*Math.PI*2;const d=R()*bR*.4;
      const zx=cx+Math.cos(a)*d,zy=fcy+Math.sin(a)*d;
      if(R()<.4)HT(zx,zy,bR*(.06+R()*.08),R()*Math.PI,5,al*.25,R);
      else if(R()<.6){SA(zx,zy,bR*(.05+R()*.1),R()*Math.PI,R()*Math.PI+1.5+R(),al*.18,R);}
      else{const s=5+R()*12;ST(zx-s,zy+(R()-.5)*s,zx+s,zy+(R()-.5)*s,al*.2,R);
        ST(zx+(R()-.5)*s,zy-s,zx+(R()-.5)*s,zy+s,al*.2,R);}}
    for(let i=0;i<2+Math.floor(R()*2);i++){const a=R()*Math.PI*2,r=bR*(.3+R()*.4);
      const px=cx+Math.cos(a)*r,py=fcy+Math.sin(a)*r;
      const len=20+R()*40;const da=a+Math.PI/2+(R()-.5)*.5;
      ST(px,py,px+Math.cos(da)*len,py+Math.sin(da)*len,al*.15,R);}
    ST(cx-bR*.1,fcy,cx+bR*.1,fcy,al*.5,R);ST(cx,fcy-bR*.1,cx,fcy+bR*.1,al*.5,R);
    ST(cx,ancY,cx,fcy+bR*.5,al*.4,R);
  }

  // ==========================================
  // CLASSIFY + PARALLEL -> GRID
  // ==========================================
  else if(key==='classify_parallel'){
    const nC=3+Math.floor(p.mul/2);const nR=4+Math.floor(p.cpx);
    const gW=Math.min(bR*1.2,zoneW);
    const gH=Math.min(bR*1.2,zoneH*.9);
    for(let r=0;r<=nR;r++){const y=fcy-gH/2+r*gH/nR;ST(cx-gW/2,y,cx+gW/2,y,al*(.3+.1*Math.sin(r)),R);}
    for(let c=0;c<=nC;c++){const x=cx-gW/2+c*gW/nC;ST(x,fcy-gH/2,x,fcy+gH/2,al*(.3+.1*Math.sin(c)),R);}
    for(let r=0;r<nR;r++){for(let c=0;c<nC;c++){
      if(R()<p.den*.65){const cx2=cx-gW/2+(c+.5)*gW/nC;const cy2=fcy-gH/2+(r+.5)*gH/nR;
        const cr=Math.min(gW/nC,gH/nR)*.3;
        if(R()<.5)SA(cx2,cy2,cr,0,Math.PI*2,al*.3,R);else HT(cx2,cy2,cr,R()*Math.PI,5,al*.25,R);}}}
    ST(cx,ancY,cx,fcy+gH/2,al*.35,R);
    rootH(cx-gW/2);rootH(cx+gW/2);
  }

  // ==========================================
  // CLASSIFY + LEAP -> SHARDS
  // ==========================================
  else if(key==='classify_leap'){
    const n=5+p.mul;const pieces=[];
    for(let i=0;i<n;i++){const a=R()*Math.PI*2;const d=15+R()*bR*.7;
      const px=cx+Math.cos(a)*d,py=fcy+Math.sin(a)*d;const pr=15+R()*bR*.16;
      const sides=3+Math.floor(R()*2);

      if(vs.length>2){ST(vs[0].x,vs[0].y,vs[Math.floor(vs.length/2)].x,vs[Math.floor(vs.length/2)].y,al*.25,R);}
      if(R()<.35)HT(px,py,pr*.4,R()*Math.PI,5,al*.2,R);
      else if(R()<.5)SA(px,py,pr*.5,R()*Math.PI,R()*Math.PI+Math.PI*(0.5+R()),al*.2,R);
      else if(R()<.3){const s=pr*.3;ST(px-s,py,px+s,py,al*.2,R);ST(px,py-s,px,py+s,al*.2,R);}

    for(let i=0;i<n;i++){for(let j=i+1;j<n;j++){
      const d=Math.sqrt((pieces[i].x-pieces[j].x)**2+(pieces[i].y-pieces[j].y)**2);
      if(d<bR*.5&&R()<.4){ST(pieces[i].x,pieces[i].y,pieces[j].x,pieces[j].y,al*.12,R);}}}
    let cl=pieces[0],cd=1e9;pieces.forEach(p2=>{const d=Math.abs(p2.y-ancY);if(d<cd){cd=d;cl=p2;}});
    ST(cx,ancY,cl.x,cl.y,al*.3,R);
  }

  // ==========================================
  // CONNECT + LINEAR -> RIVER
  // ==========================================
  else if(key==='connect_linear'){
    const nW=2+Math.floor(p.mul/2);const totalH=Math.min(bR*1.5,zoneH);
    for(let w=0;w<nW;w++){
      const amp=bR*(.15+R()*.2);const freq=2+p.cpx*.5+R();
      const yOff=(w-(nW-1)/2)*bR*.2;
      const pts=[];
      for(let i=0;i<=80;i++){const t=i/80;
        pts.push({x:cx-bR*.7+t*bR*1.4, y:fcy+yOff+Math.sin(t*freq*Math.PI)*amp});}
      for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,al*(.4+.25*(1-w/nW)),R);
      for(let i=5;i<pts.length;i+=4+Math.floor(R()*3)){
        const pt=pts[i];const rl=3+R()*8;

    for(let h=0;h<2+Math.floor(p.den*3);h++){
      const ix=cx+(R()-.5)*bR*1.1,iy=fcy+(R()-.5)*bR*.6;
      if(R()<.5){SA(ix,iy,8+R()*18,0,Math.PI*2,al*.2,R);HT(ix,iy,6+R()*10,R()*Math.PI,5,al*.12,R);}
      else{PG(ix,iy,10+R()*15,3+Math.floor(R()*3),R()*Math.PI,al*.18,R);}}
    for(let h=0;h<Math.floor(p.cpx*.5)+1;h++){
      const y=fcy+(R()-.5)*bR*.5;ST(cx-bR*.3+R()*20,y-15-R()*20,cx+bR*.3-R()*20,y+15+R()*20,al*.07,R);}
    const botPt=fcy+bR*.3;ST(cx,ancY,cx,botPt>ancY?ancY:botPt,al*.3,R);
  }

  // ==========================================
  // CONNECT + SPIRAL -> DOUBLE HELIX
  // ==========================================
  else if(key==='connect_spiral'){
    const turns=2+p.cpx*.4;
    for(let arm=0;arm<2;arm++){const dir=arm===0?1:-1;const pts=[];const tot=Math.floor(turns*50);
      for(let i=0;i<=tot;i++){const t=i/tot;const a=t*turns*Math.PI*2*dir+arm*Math.PI;
        const r=8+Math.pow(t,.5)*bR;pts.push({x:cx+Math.cos(a)*r,y:fcy+Math.sin(a)*r});}
      for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,al*(.45+.2*(1-arm)),R);
      for(let i=0;i<pts.length;i+=2+Math.floor(R()*2)){const pt=pts[i];const a=Math.atan2(pt.y-fcy,pt.x-cx)+Math.PI/2;
        const cl=4+R()*12;ST(pt.x+Math.cos(a)*cl,pt.y+Math.sin(a)*cl,pt.x-Math.cos(a)*cl,pt.y-Math.sin(a)*cl,al*.28,R);}}
    for(let i=0;i<4+p.mul;i++){const a=R()*Math.PI*2;const r=bR*(.2+R()*.6);
      ST(cx+Math.cos(a)*r,fcy+Math.sin(a)*r,cx+Math.cos(a+.3)*r*.9,fcy+Math.sin(a+.3)*r*.9,al*.2,R);
      if(R()<.4){const fx=cx+Math.cos(a)*r*1.1,fy=fcy+Math.sin(a)*r*1.1;
        PG(fx,fy,6+R()*12,3+Math.floor(R()*2),R()*Math.PI,al*.15,R);}
      if(R()<.3){const fx=cx+Math.cos(a+1)*r*.5,fy=fcy+Math.sin(a+1)*r*.5;
        HT(fx,fy,8+R()*10,R()*Math.PI,5,al*.1,R);}}
    ST(cx,ancY,cx,fcy+bR*.35,al*.4,R);
  }

  // ==========================================
  // CONNECT + PARALLEL -> CONSTELLATION
  // ==========================================
  else if(key==='connect_parallel'){
    const n=8+p.mul*2;const nds=[];
    for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2+R()*.5;const d=20+R()*bR*.7;
      nds.push({x:cx+Math.cos(a)*d,y:fcy+Math.sin(a)*d});}
    for(let i=0;i<n;i++){const sorted=nds.map((nd,j)=>({j,d:Math.sqrt((nd.x-nds[i].x)**2+(nd.y-nds[i].y)**2)}))
      .filter(x=>x.j!==i).sort((a,b)=>a.d-b.d);
      for(let c=0;c<Math.min(3,sorted.length);c++){if(sorted[c].d<bR*.7)
        ST(nds[i].x,nds[i].y,nds[sorted[c].j].x,nds[sorted[c].j].y,al*.2,R);}}
    nds.forEach(nd=>{const t=R();
      if(t<.3){SA(nd.x,nd.y,5+R()*6,0,Math.PI*2,al*.55,R);const s=3+R()*4;ST(nd.x-s,nd.y,nd.x+s,nd.y,al*.4,R);ST(nd.x,nd.y-s,nd.x,nd.y+s,al*.4,R);}
      else if(t<.55){PG(nd.x,nd.y,6+R()*10,3+Math.floor(R()*3),R()*Math.PI,al*.4,R);}
      else if(t<.75){HT(nd.x,nd.y,6+R()*8,R()*Math.PI,4,al*.25,R);}
      else{SA(nd.x,nd.y,4+R()*8,R()*Math.PI,R()*Math.PI+Math.PI*(0.6+R()*.8),al*.4,R);
        const s=5+R()*6;ST(nd.x-s,nd.y-(R()-.5)*s,nd.x+s,nd.y+(R()-.5)*s,al*.25,R);}});
    let cl=nds[0],cd=1e9;nds.forEach(nd=>{const d=Math.abs(nd.y-ancY);if(d<cd){cd=d;cl=nd;}});
    ST(cx,ancY,cl.x,cl.y,al*.3,R);
  }

  // ==========================================
  // CONNECT + LEAP -> ARCHIPELAGO
  // ==========================================
  else if(key==='connect_leap'){
    const n=5+p.mul;const cells=[];
    for(let i=0;i<n;i++){const a=R()*Math.PI*2;const d=R()*bR*.7;
      const cr=25+R()*bR*.14;const ccx=cx+Math.cos(a)*d,ccy=fcy+Math.sin(a)*d;
      if(R()<.6){SA(ccx,ccy,cr,0,Math.PI*2,al*(.45+R()*.2),R);SA(ccx,ccy,cr*.6,0,Math.PI*2,al*.2,R);}
      else{PG(ccx,ccy,cr,4+Math.floor(R()*3),R()*Math.PI,al*(.4+R()*.2),R);}
      if(p.den>.4){for(let j=0;j<3+Math.floor(R()*3);j++){
        const ia=R()*Math.PI*2;const ir=R()*cr*.4;const fx=ccx+Math.cos(ia)*ir,fy=ccy+Math.sin(ia)*ir;
        if(R()<.5){ctx.beginPath();ctx.arc(fx,fy,2+R()*3,0,Math.PI*2);ctx.fillStyle=`rgba(${INK},${al*.25})`;ctx.fill();}
        else{ST(fx-3-R()*4,fy,fx+3+R()*4,fy,al*.18,R);}}}
      cells.push({x:ccx,y:ccy,r:cr});}
    for(let i=0;i<cells.length;i++){for(let j=i+1;j<cells.length;j++){
      const d=Math.sqrt((cells[i].x-cells[j].x)**2+(cells[i].y-cells[j].y)**2);
      if(d<cells[i].r+cells[j].r+80){
        const mx=(cells[i].x+cells[j].x)/2+(R()-.5)*40;
        const my=(cells[i].y+cells[j].y)/2+(R()-.5)*40;
        ST(cells[i].x,cells[i].y,mx,my,al*.15,R);ST(mx,my,cells[j].x,cells[j].y,al*.15,R);}}}
    ST(cx,ancY,cx,fcy+bR*.35,al*.3,R);
  }

  // ==========================================
  // LAYER + LINEAR -> PEAKS
  // ==========================================
  else if(key==='layer_linear'){
    const nRanges=3+Math.floor(p.cpx);const totalH=Math.min(bR*1.4,zoneH);
    for(let rng=0;rng<nRanges;rng++){
      const t=rng/nRanges;const baseY=ancY-t*totalH*.7;
      const nPeaks=2+Math.floor(R()*3);const w=Math.min(bR*(.6+t*.5),zoneHW);
      const pts=[{x:cx-w,y:baseY}];
      for(let pk=0;pk<nPeaks;pk++){
        const peakX=cx-w+(pk+.5)*w*2/nPeaks+(R()-.5)*40;
        const peakH=bR*(.15+R()*.35)*(1+t*.5);
        pts.push({x:peakX,y:baseY-peakH});
        if(pk<nPeaks-1)pts.push({x:peakX+w/nPeaks*(.3+R()*.4),y:baseY-peakH*.2-R()*20});}
      pts.push({x:cx+w,y:baseY});
      for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,al*(.3+t*.4),R);
      if(p.den>.3&&R()<.6){const mid=pts[Math.floor(pts.length/2)];
        HT(mid.x,baseY-20-R()*30,bR*(.05+R()*.1),R()*.3,5,al*.2,R);}
    }
    for(let i=0;i<2+Math.floor(R()*2);i++){
      const px=cx+(R()-.5)*bR*.6;const py=fcy-bR*.2+R()*bR*.3;
      ST(px-4,py,px+4,py,al*.15,R);}
    const baseW=bR*.6;
    rootH(cx-baseW);rootH(cx+baseW);
  }

  // ==========================================
  // LAYER + SPIRAL -> TOPOGRAPHIC
  // ==========================================
  else if(key==='layer_spiral'){
    const nRings=5+Math.floor(p.cpx*1.5)+Math.floor(p.mul/2);
    for(let i=0;i<nRings;i++){const r=bR*(.08+(i/nRings)*.85);const wobble=6+R()*12;
      const pts=[];for(let j=0;j<=60;j++){const a=(j/60)*Math.PI*2;
        const wr=r+Math.sin(a*(3+i%3))*wobble+Math.cos(a*(5+i%2))*wobble*.5;
        pts.push({x:cx+Math.cos(a)*wr,y:fcy+Math.sin(a)*wr});}
      for(let j=0;j<pts.length-1;j++)ST(pts[j].x,pts[j].y,pts[j+1].x,pts[j+1].y,al*(.2+.04*i),R);}
    for(let i=0;i<2+Math.floor(p.cpx*.5);i++){const a=R()*Math.PI*2,d=bR*(.15+R()*.5);
      const px=cx+Math.cos(a)*d,py=fcy+Math.sin(a)*d;
      PG(px,py,12+R()*25,3+Math.floor(R()*3),R()*Math.PI,al*.2,R);}
    for(let i=0;i<3+Math.floor(p.den*3);i++){const a=R()*Math.PI*2,d=R()*bR*.5;
      const ex=cx+Math.cos(a)*d,ey=fcy+Math.sin(a)*d;
      if(R()<.5){ST(ex-3,ey,ex+3,ey,al*.35,R);ST(ex,ey-3,ex,ey+3,al*.35,R);}
      else{HT(ex,ey,8+R()*12,R()*Math.PI,5,al*.15,R);}}
    for(let i=0;i<Math.floor(p.den*2)+1;i++){const a=R()*Math.PI*2;
      ST(cx+Math.cos(a)*bR*.1,fcy+Math.sin(a)*bR*.1,cx+Math.cos(a)*bR*(.5+R()*.3),fcy+Math.sin(a)*bR*(.5+R()*.3),al*.1,R);}
    ST(cx,ancY,cx,fcy+bR*.6,al*.3,R);
  }

  // ==========================================
  // LAYER + PARALLEL -> TOTEMS
  // ==========================================
  else if(key==='layer_parallel'){
    const nTot=2+Math.floor(p.mul/3);const totW=bR*.08;

      const tx=cx+(ti-(nTot-1)/2)*totW*5;const totH=Math.min(bR*(.9+R()*.5),zoneH*.95);

        else{ST(tx-totW*.5,sy+2,tx+totW*.5,sy+totH/(nSec+1)*.7,al*.3,R);

      if(R()<.7){PG(tx,ancY-totH-totW*1.2,totW*1.2,3,-Math.PI/2,al*.45,R);}
    }

  // ==========================================
  // LAYER + LEAP -> STRATA
  // ==========================================
  else if(key==='layer_leap'){
    const nSlabs=5+Math.floor(p.cpx*1.5);
    for(let i=0;i<nSlabs;i++){const t=i/nSlabs;const y=Math.max(zoneT+10,fcy-bR*.7)+t*Math.min(bR*1.3,zoneH*.8);
      const ox=(R()-.5)*80;const w=Math.min(bR*(.15+R()*.3),zoneHW*.8);const h=bR*(.03+R()*.06);
      ST(cx+ox-w,y-h,cx+ox+w,y-h,al*(.35+t*.3),R);
      ST(cx+ox+w,y-h,cx+ox+w,y+h,al*(.35+t*.3),R);

      ST(cx+ox-w,y+h,cx+ox-w,y-h,al*(.35+t*.3),R);

        ST(cx+ox-w+3,ly,cx+ox+w-3,ly,al*.12,R);}
      if(R()<p.den*.5)HT(cx+ox,y,Math.min(w*.3,h),R()*.2,5,al*.18,R);

    ST(cx,ancY,cx,fcy+bR*.5,al*.25,R);
  }

  // ==========================================
  // GROW + LINEAR -> TREE
  // ==========================================
  else if(key==='grow_linear'){
    const maxD=2+Math.floor(p.cpx*.7);const brN=p.mul<3?2:p.mul<6?3:4;
    function br(bx2,by2,a,d,lm){if(d>maxD)return;
      const len=(maxD-d+1)*(bR*0.09)*lm*(.8+R()*.4);

      for(let b=0;b<brN;b++){const na=a+(b-(brN-1)/2)*.25+(R()-.5)*.06;br(ex,ey,na,d+1,.75+R()*.1);}}
    br(cx,ancY,-Math.PI/2+(R()-.5)*.1,0,1);
    if(p.cpx>2){br(cx-12,ancY,-Math.PI/2-.22,1,.5);br(cx+12,ancY,-Math.PI/2+.22,1,.5);}
  }

  // ==========================================
  // GROW + SPIRAL -> FERN
  // ==========================================
  else if(key==='grow_spiral'){
    const nFronds=2+Math.floor(p.mul/2);
    for(let f=0;f<nFronds;f++){
      const baseA=-Math.PI/2+(f-(nFronds-1)/2)*.35+(R()-.5)*.1;
      const mainLen=Math.min(bR*(.7+R()*.3),zoneH*.85);const curl=(R()>.5?1:-1)*.6;
      const pts=[];let px2=cx,py2=ancY;
      for(let i=0;i<=30;i++){const t=i/30;
        const a=baseA+curl*t*t;const step=mainLen/30;
        px2+=Math.cos(a)*step;py2+=Math.sin(a)*step;pts.push({x:px2,y:py2});}
      for(let i=0;i<pts.length-1;i++)ST(pts[i].x,pts[i].y,pts[i+1].x,pts[i+1].y,al*(.4+.3*(1-f/nFronds)),R);
      for(let i=3;i<pts.length;i+=2){const pt=pts[i];const prev=pts[i-1];
        const da=Math.atan2(pt.y-prev.y,pt.x-prev.x);const side=(i%4<2)?1:-1;

        const lx=pt.x+Math.cos(la)*ll,ly=pt.y+Math.sin(la)*ll;
        ST(pt.x,pt.y,lx,ly,al*.3,R);
        if(R()<p.den*.5)SA(lx,ly,3+R()*4,0,Math.PI*2,al*.2,R);}
      const tip=pts[pts.length-1];const tipA=baseA+curl;
      SA(tip.x+Math.cos(tipA)*12,tip.y+Math.sin(tipA)*12,8+R()*8,0,Math.PI*1.5,al*.35,R);
    }
  }

  // ==========================================
  // GROW + PARALLEL -> GRASS FIELD
  // ==========================================
  else if(key==='grow_parallel'){
    const nStems=12+p.mul*4;const fieldW=Math.min(bR*1.3,zoneW);
    for(let i=0;i<nStems;i++){const sx=cx-fieldW/2+R()*fieldW;const sh=Math.min(bR*(.25+R()*.85),zoneH*.95);
      const sway=(R()-.5)*.25;const pts=[];
      for(let j=0;j<=10;j++){const t=j/10;
        pts.push({x:sx+Math.sin(t*Math.PI+sway)*sh*.06+sway*t*25,y:ancY-t*sh});}
      for(let j=0;j<pts.length-1;j++)ST(pts[j].x,pts[j].y,pts[j+1].x,pts[j+1].y,al*(.2+R()*.3),R);
      if(R()<p.den){const top=pts[pts.length-1];
        ST(top.x,top.y,top.x+(R()-.5)*16,top.y-5-R()*12,al*.3,R);}
      if(sh>bR*.5&&R()<.5){const mid=pts[5];
        ST(mid.x,mid.y,mid.x+12+R()*18,mid.y-8-R()*12,al*.2,R);}
      if(R()<.3){const top=pts[pts.length-1];SA(top.x,top.y-5,4+R()*8,0,Math.PI*2,al*.25,R);}
      if(R()<.15){const top=pts[pts.length-1];PG(top.x,top.y-8,5+R()*10,3+Math.floor(R()*3),R()*Math.PI,al*.2,R);}
    }
    for(let i=0;i<Math.floor(p.den*3)+1;i++){const y=ancY-bR*(.2+R()*.5);const hw=fieldW*(.1+R()*.2);
      SA(cx+(R()-.5)*fieldW*.3,y,hw,R()*.5,R()*.5+Math.PI*(.5+R()),al*.08,R);}
    for(let i=0;i<Math.floor(p.den*8)+2;i++){const gx=cx+(R()-.5)*fieldW;
      if(R()<.6)ST(gx-4,ancY+R()*3,gx+4,ancY+R()*3,al*.12,R);
      else PG(gx,ancY-2-R()*8,3+R()*5,3,R()*Math.PI,al*.1,R);}
    ST(cx-fieldW/2,ancY,cx+fieldW/2,ancY,al*.12,R);
    rootH(cx-fieldW/2);rootH(cx+fieldW/2);
  }

  // ==========================================
  // GROW + LEAP -> DANDELION
  // ==========================================
  else if(key==='grow_leap'){
    const nRays=8+Math.floor(p.mul*1.5);
    for(let i=0;i<nRays;i++){const a=(i/nRays)*Math.PI*2+R()*.15;
      const rl=bR*(.2+R()*.2);
      ST(cx+Math.cos(a)*5,fcy+Math.sin(a)*5,cx+Math.cos(a)*rl,fcy+Math.sin(a)*rl,al*.35,R);}
    SA(cx,fcy,bR*.08,0,Math.PI*2,al*.5,R);
    const nSeeds=4+Math.floor(p.mul);
    for(let i=0;i<nSeeds;i++){const a=R()*Math.PI*2;const d=bR*(.35+R()*.45);
      const sx=cx+Math.cos(a)*d,sy=fcy+Math.sin(a)*d;
      SA(sx,sy,5+R()*7,0,Math.PI*2,al*.4,R);
      for(let f=0;f<4+Math.floor(R()*3);f++){const fa=R()*Math.PI*2;const fl=6+R()*10;
        ST(sx+Math.cos(fa)*3,sy+Math.sin(fa)*3,sx+Math.cos(fa)*fl,sy+Math.sin(fa)*fl,al*.2,R);}
      const mx=sx+(cx-sx)*.4+(R()-.5)*40;const my=sy+(fcy-sy)*.4+(R()-.5)*40;
      ST(sx,sy,mx,my,al*.1,R);ST(mx,my,cx+Math.cos(a)*bR*.15,fcy+Math.sin(a)*bR*.15,al*.08,R);}
    ST(cx,ancY,cx,fcy+bR*.06,al*.4,R);
  }

  // ===== FALLBACK =====
  else{
    PG(cx,fcy,bR*.6,5,R(),al*.5,R);PG(cx,fcy,bR*.3,4,R(),al*.35,R);
    ST(cx,ancY,cx,fcy+bR*.4,al*.4,R);
  }

  // ===== HYBRID MIX =====
  const mR=mkR(p.seed+777);
  const nMix=3+Math.floor(p.den*5);
  if(['classify_linear','classify_parallel','classify_leap','layer_parallel','layer_leap'].includes(key)){
    for(let i=0;i<nMix;i++){const a=mR()*Math.PI*2,d=bR*(.15+mR()*.55);
      SA(cx+Math.cos(a)*d,fcy+Math.sin(a)*d,12+mR()*25,mR()*Math.PI,mR()*Math.PI+1+mR()*2,al*.15,R);}
  }
  if(['connect_linear','connect_spiral','layer_spiral','grow_spiral','grow_parallel'].includes(key)){
    for(let i=0;i<nMix;i++){const a=mR()*Math.PI*2,d=bR*(.15+mR()*.55);
      PG(cx+Math.cos(a)*d,fcy+Math.sin(a)*d,8+mR()*18,3+Math.floor(mR()*2),mR()*Math.PI,al*.15,R);}
  }
  if(['classify_spiral','connect_parallel','connect_leap','grow_leap','layer_spiral'].includes(key)){
    for(let i=0;i<Math.floor(nMix*.7);i++){const y=fcy-bR*.4+mR()*bR*.8;const hw=bR*(.1+mR()*.25);
      ST(cx-hw,y,cx+hw,y,al*.08,R);}
  }
  if(['grow_linear','layer_linear','layer_parallel','grow_parallel'].includes(key)){
    for(let i=0;i<nMix;i++){const ox=(mR()-.5)*bR*.8,oy=-bR*(.2+mR()*.5);
      if(mR()<.5)SA(cx+ox,ancY+oy,10+mR()*20,mR()*Math.PI*2,mR()*Math.PI*2+Math.PI*(0.5+mR()),al*.12,R);
      else PG(cx+ox,ancY+oy,8+mR()*15,3+Math.floor(mR()*3),mR()*Math.PI,al*.12,R);}
  }
  for(let i=0;i<Math.floor(nMix*.5);i++){
    const a=mR()*Math.PI*2,d1=bR*(.1+mR()*.35),d2=bR*(.2+mR()*.45);const a2=a+(mR()-.5)*1.2;
    ST(cx+Math.cos(a)*d1,fcy+Math.sin(a)*d1,cx+Math.cos(a2)*d2,fcy+Math.sin(a2)*d2,al*.08,R);}
  for(let i=0;i<nMix*2;i++){const a=mR()*Math.PI*2,d=mR()*bR*.7;
    const mx=cx+Math.cos(a)*d,my=fcy+Math.sin(a)*d;
    if(mR()<.4){const s=2+mR()*5;ST(mx-s,my-s*.3,mx+s,my+s*.3,al*.12,R);}
    else{ctx.beginPath();ctx.arc(mx,my,1+mR()*2.5,0,Math.PI*2);ctx.fillStyle=`rgba(${INK},${al*.15})`;ctx.fill();}}

  // ===== ROOT CONNECTION =====
  const headHW2=headHW;
  ST(cx-headHW2,ancY,cx+headHW2,ancY,al*.35,R);
  const fanW=Math.min(bR*.5,zoneHW);
  if(fanW>headHW2){
    ST(cx-headHW2,ancY,cx-fanW,ancY-bR*.12,al*.2,R);
    ST(cx+headHW2,ancY,cx+fanW,ancY-bR*.12,al*.2,R);
    ST(cx-headHW2*.6,ancY,cx-fanW*.7,ancY-bR*.2,al*.15,R);
    ST(cx+headHW2*.6,ancY,cx+fanW*.7,ancY-bR*.2,al*.15,R);
  }

  // ===== FLIP-BASED OVERLAYS =====
  if(f2){
    for(let i=0;i<4;i++){const r=bR*(.25+i*.2);SA(cx,fcy,r,R()*Math.PI,R()*Math.PI+Math.PI*(.6+R()*.5),al*.1,R);}
  }
  if(f3){
    const nDots=Math.floor(p.den*30)+12;
    for(let i=0;i<nDots;i++){const a=R()*Math.PI*2,d=R()*bR*.75;
      ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,fcy+Math.sin(a)*d,1+R()*2.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${INK},${al*.2})`;ctx.fill();}
  }
  if(f1&&f3){
    for(let i=0;i<6+Math.floor(p.den*6);i++){const y=fcy-bR*.5+R()*bR;const w=bR*(.15+R()*.25);
      ST(cx-w,y-w*.3,cx+w,y+w*.3,al*.07,R);}
  }

  // ===== GLOBAL OVERLAYS (rhythm) =====
  if(p.rhy==='flash'){const n=5+Math.floor(R()*5);for(let i=0;i<n;i++){const a=R()*Math.PI*2;
    ST(cx+Math.cos(a)*bR*.2,fcy+Math.sin(a)*bR*.2,cx+Math.cos(a)*bR*(.7+R()*.2),fcy+Math.sin(a)*bR*(.7+R()*.2),al*.18,R);}}
  if(p.rhy==='bounce'){for(let i=0;i<3+Math.floor(R()*3);i++){const a=R()*Math.PI*2;
    SA(cx,fcy,bR*(.3+R()*.45),a,a+.5+R()*.6,al*.15,R);}}
  if(p.rhy==='ferment'){HT(cx,fcy,bR*.15,R()*Math.PI,6,al*.18,R);}
  if(p.rhy==='accumulate'){for(let i=0;i<Math.floor(p.den*18)+6;i++){const a=R()*Math.PI*2,d=R()*bR*.6;
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,fcy+Math.sin(a)*d,1.5+R()*1.2,0,Math.PI*2);
    ctx.fillStyle=`rgba(${INK},${al*.25})`;ctx.fill();}}
  ctx.restore();
}

// ===== AGORA STATE =====
const renderedSeeds=new Set();
const allForms=[];      // {params, offscreen} — rendered miniatures
let totalCount=0;

// ===== OVAL AGGREGATION LAYOUT =====
// Forms aggregate into a vertical oval whose base touches the bust.
// Forms overlap 0-30% (they must at least touch).

function getFormSize(count){
  if(count<50)return 160;
  if(count<=200)return 110;
  return 75;
}

function computeOvalPositions(count){
  const positions=[];
  const fS=getFormSize(count);
  // Oval zone: base = just above bust head, top = near top margin
  const baseY=bustTop-fS*0.3; // base of oval touches bust
  const topY=MG+fS*0.6;
  const ovalH=baseY-topY;
  const ovalW=Math.min(W-2*MG-fS, ovalH*0.65); // vertical oval: width < height
  const ovalCX=CX;
  const ovalCY=(topY+baseY)/2;

  // Place first form directly above bust head (touching)
  const R=mkR(7777);
  if(count>0) positions.push({x:ovalCX,y:baseY-fS*0.35});

  // Place remaining forms by trying random positions inside the oval,
  // keeping only those that touch or overlap (up to 30%) an existing form.
  for(let i=1;i<count;i++){
    let bestPos=null,bestDist=1e9;
    // Try many candidates, pick the one closest to existing cluster
    for(let attempt=0;attempt<80;attempt++){
      // Random point inside the oval
      const angle=R()*Math.PI*2;
      const rNorm=Math.sqrt(R()); // sqrt for uniform distribution inside circle
      const cx2=ovalCX+Math.cos(angle)*rNorm*ovalW/2;
      const cy2=ovalCY+Math.sin(angle)*rNorm*ovalH/2;
      // Must be inside oval: check (cx-ovalCX)^2/(w/2)^2 + (cy-ovalCY)^2/(h/2)^2 <= 1
      const ex=(cx2-ovalCX)/(ovalW/2), ey=(cy2-ovalCY)/(ovalH/2);
      if(ex*ex+ey*ey>1)continue;
      // Check overlap with existing forms: must touch (dist < fS) but not overlap >30% (dist > fS*0.7)
      let touchesAny=false,tooMuchOverlap=false;
      let minDist=1e9;
      for(let j=0;j<positions.length;j++){
        const dx=cx2-positions[j].x,dy=cy2-positions[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<fS*0.7)tooMuchOverlap=true; // >30% overlap
        if(dist<fS*1.05)touchesAny=true; // touching or slightly overlapping
        if(dist<minDist)minDist=dist;
      }
      if(touchesAny&&!tooMuchOverlap&&minDist<bestDist){
        bestDist=minDist;
        bestPos={x:cx2,y:cy2};
      }
    }
    // Fallback: if no valid touching position found, place at edge of cluster
    if(!bestPos){
      // Find the topmost/outermost form and place just beyond it
      const angle=R()*Math.PI*2;
      let fx=ovalCX+Math.cos(angle)*fS*(0.5+Math.sqrt(i)*0.3);
      let fy=ovalCY+Math.sin(angle)*fS*(0.3+Math.sqrt(i)*0.2);
      fx=Math.max(MG+fS/2,Math.min(W-MG-fS/2,fx));
      fy=Math.max(topY,Math.min(baseY-fS*0.3,fy));
      bestPos={x:fx,y:fy};
    }
    positions.push(bestPos);
  }
  return positions;
}

// ===== RENDER ONE FORM TO OFFSCREEN CANVAS =====
function renderFormOffscreen(params){
  const off=document.createElement('canvas');
  off.width=W;off.height=H;
  const savedCtx=ctx;
  ctx=off.getContext('2d');
  // Fill cream background
  ctx.fillStyle=`rgb(${CR})`;ctx.fillRect(0,0,W,H);
  // Draw form
  drawFormWith(params);
  ctx=savedCtx;
  return off;
}

// ===== DRAW MAIN CANVAS =====
function drawMainCanvas(){
  // Clear
  ctx.fillStyle=`rgb(${CR})`;ctx.fillRect(0,0,W,H);
  // Paper grain
  const GR=mkR(42);for(let i=0;i<8000;i++){ctx.fillStyle=`rgba(${180+GR()*30},${175+GR()*30},${168+GR()*30},0.012)`;
    ctx.beginPath();ctx.arc(GR()*W,GR()*H,.7+GR()*.5,0,Math.PI*2);ctx.fill();}

  // Draw miniature forms in oval layout
  const count=allForms.length;
  const positions=computeOvalPositions(count);
  const fS=getFormSize(count);
  const scale=fS/W;

  for(let i=0;i<count;i++){
    const pos=positions[i];
    const form=allForms[i];
    if(!form.offscreen||!pos)continue;
    const srcX=0,srcY=0,srcW=W,srcH=Math.floor(cutY);
    const dstW=fS;
    const dstH=Math.floor(cutY*scale);
    const dstX=pos.x-dstW/2;
    const dstY=pos.y-dstH/2;
    ctx.globalAlpha=0.85;
    ctx.drawImage(form.offscreen,srcX,srcY,srcW,srcH,dstX,dstY,dstW,dstH);
    ctx.globalAlpha=1;
  }

  // Draw shared bust
  drawBust();

  // Fade at bust top
  const bVisH=bust.h*bustScale;
  const bf2=ctx.createLinearGradient(0,bustTop-30,0,bustTop+20);
  bf2.addColorStop(0,'rgba(242,237,228,0)');bf2.addColorStop(1,'rgba(242,237,228,0)');
  ctx.fillStyle=bf2;ctx.fillRect(CX-400,bustTop-30,800,50);

  // Frame
  ctx.strokeStyle='rgba(130,125,118,0.55)';ctx.lineWidth=1.5;ctx.strokeRect(MG,MG,W-MG*2,H-MG*2);

  // Footer text
  ctx.textAlign='center';
  ctx.letterSpacing='8px';ctx.font='400 41px "DM Mono",monospace';ctx.fillStyle='rgba(42,39,37,0.6)';
  ctx.fillText('LAURIANE MOUYSSET',CX,H-MG-120);
  ctx.letterSpacing='6px';ctx.font='400 30px "DM Mono",monospace';ctx.fillStyle='rgba(122,117,108,0.6)';
  ctx.fillText('COLLECTION AGORA',CX,H-MG-55);
  ctx.letterSpacing='0px';ctx.textAlign='start';

}

// ===== ADD FORMS =====
function addForm(params){
  const key=params.seed;
  if(renderedSeeds.has(key))return;
  renderedSeeds.add(key);
  const offscreen=renderFormOffscreen(params);
  allForms.push({params,offscreen});
}

// ===== PROGRESSIVE INITIAL RENDER =====
function renderProgressively(formsList,idx,onDone){
  if(idx>=formsList.length){if(onDone)onDone();return;}
  addForm(formsList[idx]);
  drawMainCanvas();
  requestAnimationFrame(()=>renderProgressively(formsList,idx+1,onDone));
}

// ===== API FETCH =====
async function fetchForms(){
  try{
    const resp=await fetch(API_URL,{redirect:'follow'});
    const data=await resp.json();
    if(!data||!data.forms)return;
    totalCount=data.total||data.forms.length;
    const newForms=[];
    data.forms.forEach(f=>{
      const seed=Number(f.seed);
      if(renderedSeeds.has(seed))return;
      const params={
        str:f.q1_structure,
        mov:f.q2_mouvement,
        rhy:f.rythme||'accumulate',
        cpx:Number(f.complexite)||6,
        den:Number(f.densite)||0.5,
        mul:Number(f.multiplicite)||9,
        flip1:f.flip1===true||f.flip1==='TRUE'||f.flip1==='true',
        flip2:f.flip2===true||f.flip2==='TRUE'||f.flip2==='true',
        flip3:f.flip3===true||f.flip3==='TRUE'||f.flip3==='true',
        seed:seed
      };
      newForms.push(params);
    });
    if(newForms.length>0){
      renderProgressively(newForms,0,()=>drawMainCanvas());
    }
  }catch(e){
    console.warn('[agora] API fetch failed:',e);
  }
}

// ===== INIT =====
function init(){
  // Start with presets so page is never empty
  totalCount=PRESETS.length;
  renderProgressively(PRESETS,0,()=>{
    drawMainCanvas();
    // Then fetch real data
    fetchForms();
    // Set up polling
    setInterval(fetchForms,REFRESH_MIN*60*1000);
  });
}

// Wait for fonts to load
document.fonts.ready.then(init);
</script>
